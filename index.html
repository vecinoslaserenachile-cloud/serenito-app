<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.R.E.N.I.T.O. | Gestión La Serena 2026</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2210%22 fill=%22%23b91c1c%22 /><text x=%2250%22 y=%2275%22 font-family=%22Arial%22 font-size=%2270%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>S</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'ls-red': '#b91c1c', 'ls-red-dark': '#7f1d1d', 'ls-yellow': '#facc15', 'ls-gray': '#f8fafc',
            },
            animation: {
              'marquee': 'marquee 25s linear infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(100%)' },
                '100%': { transform: 'translateX(-100%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
        .map-container { height: 100%; min-height: 500px; width: 100%; border-radius: 1rem; z-index: 1; }
        .pulse-icon { background-color: #b91c1c; border-radius: 50%; width: 24px; height: 24px; border: 4px solid white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(185, 28, 28, 0); } }
        .movil-icon { background: white; border-radius: 50%; border: 2px solid #b91c1c; display: flex; align-items: center; justify-content: center; font-size: 14px; width: 32px; height: 32px; color: #b91c1c; font-weight: bold; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px); border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-ls-gray text-slate-800 overflow-x-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const UBICACIONES = { "El Faro": [-29.9045, -71.2755], "Ed. Consistorial": [-29.9027, -71.2520] };
        
        const EVENTOS_INICIALES = [
            { 
                id: 1, 
                nombre: "Inauguración Plaza de Armas", 
                fecha: "2026-04-28T11:00", 
                lugar: "Plaza de Armas", 
                direccion: "Gregorio Cordovez #400",
                coords: UBICACIONES["Ed. Consistorial"], 
                estado: "En Desarrollo", 
                responsable: "Arq. María González", 
                checklist: [{ id: 1, tarea: "Corte de Cinta", listo: false }] 
            },
            {
                id: 2,
                nombre: "Campeonato Fútbol Escolar",
                fecha: "2026-05-02T09:00",
                lugar: "Estadio La Portada",
                direccion: "Av. Estadio #100",
                coords: [-29.912, -71.256],
                estado: "Pendiente",
                responsable: "Juan Pérez (Deportes)",
                checklist: [{ id: 1, tarea: "Arbitraje", listo: false }]
            }
        ];

        function SerenitoApp() {
            const [vista, setVista] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [eventos, setEventos] = useState(EVENTOS_INICIALES);
            const [autoridades, setAutoridades] = useState([]); 
            const [locutorNombre, setLocutorNombre] = useState("");
            const [errorCarga, setErrorCarga] = useState(null);

            useEffect(() => {
                fetch('autoridades_coquimbo_2026.json')
                    .then(res => res.ok ? res.json() : Promise.reject("Error JSON"))
                    .then(data => setAutoridades(data.sort((a, b) => a.precedencia - b.precedencia)))
                    .catch(err => setErrorCarga("⚠️ Error cargando DB. Verifique archivo JSON."));
            }, []);

            const navegar = (v) => { setVista(v); setMenuOpen(false); }
            const cerrarSesion = () => { if(confirm("¿Cerrar sesión del sistema?")) alert("Sesión finalizada (Simulación)"); }

            return (
                <div className="flex h-screen flex-col md:flex-row overflow-hidden bg-slate-50">
                    
                    {/* SIDEBAR */}
                    <aside className={`fixed inset-y-0 left-0 z-40 w-72 bg-white border-r border-gray-200 transform transition-transform duration-300 ease-in-out flex flex-col shadow-2xl ${menuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0`}>
                        <div className="p-8 flex flex-col items-center bg-gradient-to-b from-ls-red to-ls-red-dark text-white">
                            <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center font-black text-4xl text-ls-red shadow-lg mb-3 border-4 border-ls-yellow">S</div>
                            <h1 className="text-xl font-black tracking-tighter">S.E.R.E.N.I.T.O.</h1>
                            <p className="text-[10px] uppercase font-bold text-ls-yellow mt-1 tracking-widest">Gestión 2026</p>
                        </div>
                        <nav className="flex-1 py-6 px-4 space-y-2 overflow-y-auto bg-gray-50">
                            <p className="px-2 text-[10px] font-black text-gray-400 uppercase mb-1 tracking-wider">Planificación</p>
                            <MenuBtn icon="Map" label="Despliegue Territorial" active={vista==='dashboard'} onClick={()=>navegar('dashboard')} />
                            <MenuBtn icon="CalendarPlus" label="Secretaría & Hitos" active={vista==='secretaria'} onClick={()=>navegar('secretaria')} />
                            
                            <p className="px-2 text-[10px] font-black text-gray-400 uppercase mb-1 mt-6 tracking-wider">Operación Live</p>
                            <MenuBtn icon="Award" label="Protocolo (Puerta)" active={vista==='protocolo'} onClick={()=>navegar('protocolo')} />
                            <MenuBtn icon="Mic2" label="Pantalla Locutor" active={vista==='locutor'} onClick={()=>navegar('locutor')} />
                            <MenuBtn icon="Settings" label="Técnica (Haz-in)" active={vista==='tecnica'} onClick={()=>navegar('tecnica')} />
                        </nav>
                        
                        <div className="p-4 border-t border-gray-200">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="w-10 h-10 rounded-full bg-ls-red text-white flex items-center justify-center font-bold text-sm">RG</div>
                                <div>
                                    <p className="font-bold text-sm text-gray-800">Rodrigo Godoy</p>
                                    <p className="text-green-600 text-[10px] font-bold flex items-center gap-1"><span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online</p>
                                </div>
                            </div>
                            <button onClick={cerrarSesion} className="w-full flex items-center justify-center gap-2 p-2 rounded-lg bg-red-50 text-red-600 font-bold hover:bg-red-100 transition text-xs uppercase tracking-wide">
                                <i data-lucide="LogOut" size={14}></i> Salir del Sistema
                            </button>
                        </div>
                    </aside>

                    {/* CABECERA MÓVIL */}
                    <div className="md:hidden bg-ls-red text-white p-4 flex justify-between items-center z-50 shadow-md">
                        <span className="font-bold">S.E.R.E.N.I.T.O.</span>
                        <button onClick={() => setMenuOpen(!menuOpen)}><i data-lucide="Menu"></i></button>
                    </div>

                    {/* MAIN */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 w-full relative flex flex-col">
                        <div className="flex-1 pb-16">
                            {errorCarga && <div className="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm border border-red-200">{errorCarga}</div>}
                            {vista === 'dashboard' && <Dashboard eventos={eventos} />}
                            {vista === 'secretaria' && <Secretaria onGuardar={(nuevo) => setEventos([...eventos, nuevo])} />}
                            {vista === 'protocolo' && <Protocolo autoridades={autoridades} setAutoridades={setAutoridades} />}
                            {vista === 'locutor' && <div className="max-w-4xl mx-auto"><VistaLocutor autoridades={autoridades} nombreLocutor={locutorNombre} setNombreLocutor={setLocutorNombre} /></div>}
                            {vista === 'tecnica' && <Tecnica eventos={eventos} setEventos={setEventos} />}
                        </div>

                        {/* WINCHA AMERICANA (TICKER LIVE) */}
                        <WinchaInformativa autoridades={autoridades} eventos={eventos} />
                    </main>
                </div>
            );
        }

        // --- COMPONENTES ---

        function WinchaInformativa({ autoridades, eventos }) {
            const presentes = autoridades.filter(a => a.presente).map(a => a.nombre + " (" + a.cargo + ")");
            const eventosActivos = eventos.filter(e => e.estado === "En Desarrollo").map(e => e.nombre + " [EN DESARROLLO]");
            
            const noticias = [
                ...presentes.map(p => `🟢 INGRESÓ: ${p}`),
                ...eventosActivos.map(e => `📢 HITO: ${e}`),
                "☀️ Temperatura: 18°C La Serena",
                "🚧 Despliegue Territorial Activo"
            ];

            return (
                <div className="fixed bottom-0 left-0 md:left-72 right-0 bg-ls-red text-white h-10 flex items-center overflow-hidden z-50 shadow-lg border-t-2 border-ls-yellow">
                    <div className="bg-ls-red-dark h-full px-4 flex items-center font-black text-xs uppercase tracking-widest z-10 shadow-lg">
                        <span className="animate-pulse mr-2">●</span> En Vivo
                    </div>
                    <div className="whitespace-nowrap animate-marquee flex items-center gap-16 text-sm font-bold pl-4">
                        {noticias.length > 0 ? noticias.map((n, i) => (
                            <span key={i} className="flex items-center gap-2"><i data-lucide="Radio" size={14} className="opacity-50"></i> {n}</span>
                        )) : <span>Esperando actualizaciones del sistema...</span>}
                    </div>
                </div>
            )
        }

        // ... Dashboard, Secretaria, Protocolo, Locutor, Tecnica (Mismo código optimizado anterior) ...
        // (Por brevedad del código maestro, aquí van los mismos componentes V10.0 pero integrados con las nuevas props)
        
        function Dashboard({ eventos }) {
            const mapRef = useRef(null);
            useEffect(() => {
                if(!mapRef.current && document.getElementById('mapa-tactico')) {
                    const map = L.map('mapa-tactico').setView([-29.9045, -71.2550], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
                    eventos.forEach(ev => {
                        const icon = L.divIcon({ className: '', html: `<div class="pulse-icon"></div>` });
                        L.marker(ev.coords, {icon}).addTo(map).bindPopup(`<b>${ev.nombre}</b><br>${ev.direccion}`);
                    });
                    mapRef.current = map;
                }
            }, [eventos]);
            return (
                <div className="h-full flex flex-col gap-6">
                    <h2 className="text-3xl font-black text-ls-red uppercase flex gap-2"><i data-lucide="Map" size="32"></i> Despliegue Territorial</h2>
                    <div className="relative flex-1 rounded-2xl overflow-hidden shadow-2xl border-4 border-white">
                        <div id="mapa-tactico" className="map-container"></div>
                        <div className="absolute top-4 right-4 glass-panel p-4 rounded-xl shadow-lg z-[500] w-64">
                            <h4 className="text-xs font-black text-ls-red uppercase mb-2">Resumen Operativo</h4>
                            <div className="flex justify-between text-sm"><span>Hitos:</span><b>{eventos.length}</b></div>
                        </div>
                    </div>
                </div>
            );
        }

        function Secretaria({ onGuardar }) {
            const [form, setForm] = useState({ nombre: '', lugar: '', fecha: '', coords: null, direccion: '', responsable: '', estado: 'Pendiente' });
            const mapRef = useRef(null);
            useEffect(() => {
                if(!mapRef.current && document.getElementById('mapa-geo')) {
                    const map = L.map('mapa-geo').setView([-29.9045, -71.2550], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
                    map.on('click', (e) => {
                        setForm(prev => ({ ...prev, coords: [e.latlng.lat, e.latlng.lng], lugar: 'Ubicación Georreferenciada', direccion: `Calle Simulada #${Math.floor(Math.random()*1000)}` }));
                        L.marker(e.latlng).addTo(map);
                    });
                    mapRef.current = map;
                }
            }, []);
            const guardar = (e) => {
                e.preventDefault();
                if(!form.coords) return alert("Seleccione ubicación en mapa");
                onGuardar({ ...form, id: Date.now(), checklist: [] });
                alert("Hito Guardado");
                setForm({ nombre: '', lugar: '', fecha: '', coords: null, direccion: '', responsable: '', estado: 'Pendiente' });
            }
            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 h-full">
                    <div className="bg-white p-8 rounded-2xl shadow-xl border-t-4 border-ls-red">
                        <h2 className="text-2xl font-black mb-6 text-ls-red flex gap-2"><i data-lucide="PenTool"></i> Nuevo Hito</h2>
                        <form onSubmit={guardar} className="space-y-4">
                            <input required className="w-full p-3 bg-gray-50 border rounded-lg" value={form.nombre} onChange={e=>setForm({...form, nombre:e.target.value})} placeholder="Nombre Evento" />
                            <input required className="w-full p-3 bg-gray-50 border rounded-lg" value={form.responsable} onChange={e=>setForm({...form, responsable:e.target.value})} placeholder="Responsable (Nombre y Cargo)" />
                            <select className="w-full p-3 bg-gray-50 border rounded-lg" value={form.estado} onChange={e=>setForm({...form, estado:e.target.value})}><option>Pendiente</option><option>En Desarrollo</option></select>
                            <input type="datetime-local" required className="w-full p-3 bg-gray-50 border rounded-lg" value={form.fecha} onChange={e=>setForm({...form, fecha:e.target.value})} />
                            <div className="bg-ls-gray p-3 rounded-lg text-sm font-bold text-gray-600">{form.direccion || "Seleccione en el mapa..."}</div>
                            <button className="w-full bg-ls-red text-white font-black py-4 rounded-xl shadow-lg">Registrar</button>
                        </form>
                    </div>
                    <div className="rounded-2xl overflow-hidden shadow-lg border border-gray-200"><div id="mapa-geo" className="map-container"></div></div>
                </div>
            );
        }

        function Protocolo({ autoridades, setAutoridades }) {
            const [busqueda, setBusqueda] = useState("");
            const filtrados = autoridades.filter(a => a.nombre.toLowerCase().includes(busqueda.toLowerCase()) || a.cargo.toLowerCase().includes(busqueda.toLowerCase()));
            
            return (
                <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 h-full">
                    <div className="xl:col-span-2 bg-white p-6 rounded-2xl shadow-lg flex flex-col">
                        <h2 className="font-black text-2xl flex gap-2 text-ls-red mb-4 uppercase"><i data-lucide="UserCheck"></i> Acreditación</h2>
                        <input type="search" placeholder="Buscar..." className="w-full p-3 border rounded-xl mb-4 bg-gray-50" value={busqueda} onChange={e=>setBusqueda(e.target.value)} />
                        <div className="flex-1 overflow-y-auto space-y-2 pr-2">
                            {filtrados.map(vip => (
                                <div key={vip.id} onClick={() => setAutoridades(autoridades.map(a => a.id === vip.id ? { ...a, presente: !a.presente } : a))} className={`p-3 rounded-lg border cursor-pointer flex justify-between items-center transition ${vip.presente ? 'bg-red-50 border-ls-red ring-1 ring-ls-red' : 'hover:bg-gray-50'}`}>
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-gray-200 overflow-hidden flex items-center justify-center font-bold text-gray-500 border">{vip.nombre.charAt(0)}</div>
                                        <div><p className="font-bold text-sm">{vip.nombre}</p><p className="text-[10px] uppercase text-ls-red font-bold">{vip.cargo}</p></div>
                                    </div>
                                    <i data-lucide={vip.presente ? 'Check' : 'Plus'} className={vip.presente ? 'text-ls-red' : 'text-gray-300'}></i>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="xl:col-span-1"><VistaLocutor autoridades={autoridades} nombreLocutor="" soloLectura={true} /></div>
                </div>
            );
        }

        function VistaLocutor({ autoridades, nombreLocutor, setNombreLocutor, soloLectura }) {
            const presentes = autoridades.filter(a => a.presente).sort((a, b) => a.precedencia - b.precedencia);
            return (
                <div className="bg-white p-6 rounded-2xl shadow-2xl border-t-8 border-ls-red h-full flex flex-col">
                    <div className="flex justify-between items-center mb-6 border-b pb-4">
                        <h3 className="text-ls-red font-black text-2xl uppercase"><i data-lucide="Mic2"></i> Pantalla Live</h3>
                        <span className="bg-ls-yellow text-yellow-900 px-3 py-1 rounded-full text-xs font-bold animate-pulse">EN VIVO</span>
                    </div>
                    {!soloLectura && <div className="mb-4"><input className="w-full bg-gray-50 p-2 rounded border font-bold text-center" placeholder="NOMBRE LOCUTOR..." value={nombreLocutor} onChange={e=>setNombreLocutor(e.target.value)} /></div>}
                    <div className="flex-1 font-mono space-y-6 bg-ls-gray p-6 rounded-xl border overflow-y-auto">
                         {nombreLocutor && <p className="text-xs text-right mb-2">🎙️ {nombreLocutor}</p>}
                        {presentes.length === 0 ? <p className="text-center text-gray-400 mt-10">Esperando...</p> : (
                            <>
                                <div className="p-4 bg-white rounded-lg border-l-4 border-ls-red shadow-sm">
                                    <p className="text-xl font-bold leading-relaxed">Saludamos a quien preside: <span className="text-ls-red">{presentes[0].vocativo} {presentes[0].cargo}, {presentes[0].nombre}</span>.</p>
                                </div>
                                {presentes.length > 1 && <ul className="space-y-3 mt-4 pl-4 border-l-2 border-gray-300">{presentes.slice(1).map(p => <li key={p.id} className="text-sm font-bold text-gray-700">{p.vocativo}, {p.cargo}, {p.nombre}.</li>)}</ul>}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        function Tecnica({ eventos, setEventos }) {
            const [sel, setSel] = useState(eventos[0]);
            const toggle = (taskId) => {
                const nuevoCheck = sel.checklist.map(t => t.id === taskId ? { ...t, listo: !t.listo } : t);
                const actualizado = { ...sel, checklist: nuevoCheck };
                setEventos(eventos.map(ev => ev.id === sel.id ? actualizado : ev));
                setSel(actualizado);
            }
            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 h-full">
                    <div className="lg:col-span-1 space-y-2 overflow-y-auto">
                        <h2 className="font-black text-xl text-ls-red mb-4">Hitos Activos</h2>
                        {eventos.map(ev => <div key={ev.id} onClick={() => setSel(ev)} className={`p-4 rounded-xl cursor-pointer border ${sel.id === ev.id ? 'bg-ls-red text-white shadow-lg' : 'bg-white hover:bg-gray-50'}`}><h3 className="font-bold text-sm">{ev.nombre}</h3><p className="text-[10px] opacity-80">{ev.responsable}</p></div>)}
                    </div>
                    <div className="lg:col-span-2 bg-white p-8 rounded-2xl shadow-xl border-t-4 border-ls-yellow flex flex-col">
                         <h2 className="font-black text-2xl mb-2">{sel.nombre}</h2>
                         <p className="text-sm text-gray-500 mb-6 flex gap-2"><i data-lucide="User"></i> Resp: {sel.responsable}</p>
                         <h3 className="font-bold text-lg mb-4 text-ls-yellow">Checklist Técnica</h3>
                         <div className="space-y-2 flex-1 overflow-y-auto">
                            {sel.checklist.map(t => <div key={t.id} onClick={() => toggle(t.id)} className={`p-4 rounded-xl border cursor-pointer flex justify-between ${t.listo ? 'bg-green-50 border-green-500 text-green-700' : 'bg-white hover:bg-gray-50'}`}><span className={`font-bold ${t.listo ? 'line-through' : ''}`}>{t.tarea}</span>{t.listo ? <i data-lucide="CheckCircle2"></i> : <div className="w-5 h-5 rounded-full border-2 border-gray-300"></div>}</div>)}
                         </div>
                    </div>
                </div>
            )
        }

        const MenuBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl mb-1 transition-all ${active ? 'bg-ls-red text-white shadow-md' : 'text-gray-500 hover:bg-ls-red/5 hover:text-ls-red'}`}><i data-lucide={icon} size="18"></i><span className="text-xs font-bold uppercase tracking-wide">{label}</span></button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SerenitoApp />);
        setTimeout(() => lucide.createIcons(), 500);
        setInterval(() => lucide.createIcons(), 2000);
    </script>
</body>
</html>
