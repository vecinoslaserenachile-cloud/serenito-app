<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.R.E.N.I.T.O. | Live Ops</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2210%22 fill=%22%23b91c1c%22 /><text x=%2250%22 y=%2275%22 font-family=%22Arial%22 font-size=%2270%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>S</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'ls-red': '#b91c1c',
              'ls-stone': '#292524',
              'ls-gold': '#d97706',
            }
          }
        }
      }
    </script>
    <style>
        .map-container { height: 350px; width: 100%; border-radius: 0.75rem; z-index: 1; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(0,0,0,0.05); }
        input, select, textarea { font-size: 16px !important; }
        .scroll-hide::-webkit-scrollbar { display: none; }

        /* ANIMACIÓN DE PULSO PARA EVENTOS */
        .pulse-icon {
            background-color: #ef4444;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            border: 3px solid white;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* ICONOS DE MÓVILES */
        .movil-icon {
            background: white;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .movil-prod { border-color: #eab308; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- BASE DE DATOS REAL ---
        const DB_AUTORIDADES_REAL = [
            { id: 101, nombre: "Cristóbal Juliá", cargo: "Gobernador Regional", vocativo: "Sr. Gobernador", categoria: "Regional", estado: "pendiente" },
            { id: 102, nombre: "Galo Luna Penna", cargo: "Delegado Presidencial", vocativo: "Sr. Delegado", categoria: "Regional", estado: "pendiente" },
            { id: 103, nombre: "Daniela Norambuena", cargo: "Alcaldesa de La Serena", vocativo: "Sra. Alcaldesa", categoria: "Municipal", estado: "pendiente" },
            { id: 201, nombre: "Sergio Gahona", cargo: "Senador", vocativo: "H. Senador", categoria: "Parlamentario", estado: "pendiente" },
            { id: 301, nombre: "Ricardo Cifuentes", cargo: "Diputado", vocativo: "H. Diputado", categoria: "Parlamentario", estado: "pendiente" },
            { id: 401, nombre: "Rayén Pojomovsky", cargo: "Concejala", vocativo: "Sra. Concejala", categoria: "Concejo", estado: "pendiente" },
            { id: 402, nombre: "Luisa Jinete", cargo: "Concejala", vocativo: "Sra. Concejala", categoria: "Concejo", estado: "pendiente" },
            { id: 501, nombre: "Luz Martínez", cargo: "DIDECO", vocativo: "Directora", categoria: "Municipal", estado: "pendiente" },
        ];

        const UBICACIONES = {
            "El Faro": [-29.9045, -71.2755],
            "Ed. Consistorial": [-29.9027, -71.2520],
            "Coliseo": [-29.9126, -71.2566],
            "Delegación": [-29.9360, -71.2680],
            "Parque P. Valdivia": [-29.9090, -71.2550]
        };

        // --- MÓVILES EN TERRENO (Simulación GPS) ---
        const MOVILES_INICIALES = [
            { id: 'M1', nombre: 'Seguridad 1460', tipo: 'seguridad', lat: -29.9040, lng: -71.2530 },
            { id: 'M2', nombre: 'Producción Van 1', tipo: 'produccion', lat: -29.9080, lng: -71.2600 },
            { id: 'M3', nombre: 'Alcaldía 1', tipo: 'oficial', lat: -29.9020, lng: -71.2500 },
        ];

        function SerenitoApp() {
            const [vista, setVista] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [eventos, setEventos] = useState([
                { id: 1, nombre: "Cuenta Pública 2026", fecha: "2026-04-28T11:00", lugar: "Ed. Consistorial", coords: UBICACIONES["Ed. Consistorial"] },
                { id: 2, nombre: "Festival del Faro", fecha: "2026-02-28T21:00", lugar: "El Faro", coords: UBICACIONES["El Faro"] }
            ]);
            const [autoridades, setAutoridades] = useState(DB_AUTORIDADES_REAL);
            const [moviles, setMoviles] = useState(MOVILES_INICIALES);

            // SIMULACIÓN DE MOVIMIENTO DE MÓVILES (GPS)
            useEffect(() => {
                const intervaloGPS = setInterval(() => {
                    setMoviles(prevMoviles => prevMoviles.map(m => ({
                        ...m,
                        lat: m.lat + (Math.random() - 0.5) * 0.0005, // Movimiento aleatorio pequeño
                        lng: m.lng + (Math.random() - 0.5) * 0.0005
                    })));
                }, 2000); // Actualiza cada 2 segundos

                return () => clearInterval(intervaloGPS);
            }, []);

            const navegar = (v) => { setVista(v); setMenuOpen(false); }

            return (
                <div className="flex h-screen flex-col md:flex-row overflow-hidden font-sans">
                    
                    {/* BARRA MÓVIL */}
                    <div className="md:hidden bg-ls-stone text-white p-4 flex justify-between items-center shadow-md z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-ls-red rounded flex items-center justify-center font-bold">S</div>
                            <span className="font-bold tracking-tighter">S.E.R.E.N.I.T.O.</span>
                        </div>
                        <button onClick={() => setMenuOpen(!menuOpen)}>
                            <i data-lucide={menuOpen ? "X" : "Menu"} size="28"></i>
                        </button>
                    </div>

                    {/* SIDEBAR */}
                    <aside className={`
                        fixed inset-y-0 left-0 z-40 w-72 bg-ls-stone text-white transform transition-transform duration-300 ease-in-out shadow-2xl
                        ${menuOpen ? 'translate-x-0' : '-translate-x-full'} 
                        md:relative md:translate-x-0 md:flex md:flex-col
                    `}>
                        <div className="p-6 hidden md:flex flex-col items-center border-b border-gray-700 bg-gray-900/20">
                            <div className="w-14 h-14 bg-ls-red rounded-xl flex items-center justify-center font-black text-4xl shadow-lg mb-3 border-2 border-white/10 animate-pulse">S</div>
                            <h1 className="text-xl font-black tracking-tighter">S.E.R.E.N.I.T.O.</h1>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                                <p className="text-[10px] uppercase tracking-widest text-ls-gold font-bold">Live Ops 7.0</p>
                            </div>
                        </div>
                        
                        <nav className="flex-1 py-6 space-y-1 px-3 mt-14 md:mt-0 overflow-y-auto">
                            <p className="px-4 text-[10px] font-bold text-gray-500 uppercase mb-2 mt-2">Centro de Mando</p>
                            <MenuBtn id="dashboard" icon="Map" label="Mapa Táctico" active={vista==='dashboard'} onClick={()=>navegar('dashboard')} />
                            <MenuBtn id="secretaria" icon="CalendarDays" label="Agenda & Hitos" active={vista==='secretaria'} onClick={()=>navegar('secretaria')} />
                            
                            <p className="px-4 text-[10px] font-bold text-gray-500 uppercase mb-2 mt-4">Operación</p>
                            <MenuBtn id="protocolo" icon="Award" label="Protocolo VIP" active={vista==='protocolo'} onClick={()=>navegar('protocolo')} />
                            <MenuBtn id="tecnico" icon="RadioReceiver" label="Técnica Live" active={vista==='tecnico'} onClick={()=>navegar('tecnico')} />
                            <MenuBtn id="prensa" icon="Newspaper" label="Prensa Hub" active={vista==='prensa'} onClick={()=>navegar('prensa')} />
                        </nav>

                        <div className="p-4 bg-gray-900/50 text-xs text-gray-400 border-t border-gray-800">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-ls-gold text-white flex items-center justify-center font-bold">RG</div>
                                <div>
                                    <p className="font-bold text-white">Rodrigo Godoy</p>
                                    <p className="scale-90 origin-left text-green-400 flex items-center gap-1">● Conectado</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* OVERLAY */}
                    {menuOpen && <div className="fixed inset-0 bg-black/50 z-30 md:hidden" onClick={() => setMenuOpen(false)}></div>}

                    {/* MAIN */}
                    <main className="flex-1 overflow-y-auto bg-slate-50 p-4 md:p-8 w-full">
                        <header className="flex justify-between items-center mb-6">
                            <h2 className="text-xl md:text-3xl font-black text-ls-stone uppercase tracking-tight flex items-center gap-3">
                                <i data-lucide={obtenerIcono(vista)} className="text-ls-red hidden md:block"></i>
                                {obtenerTitulo(vista)}
                            </h2>
                            <div className="hidden md:block text-right">
                                <p className="text-sm font-bold text-ls-stone bg-white px-3 py-1 rounded-full shadow-sm border border-gray-200">
                                    {new Date().toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long' })}
                                </p>
                            </div>
                        </header>

                        <div className="animate-fade-in pb-20 md:pb-0 max-w-7xl mx-auto">
                            {vista === 'dashboard' && <Dashboard eventos={eventos} autoridades={autoridades} moviles={moviles} />}
                            {vista === 'secretaria' && <Secretaria onGuardar={(e) => setEventos([...eventos, e])} />}
                            {vista === 'protocolo' && <Protocolo lista={autoridades} setLista={setAutoridades} />}
                            {vista === 'tecnico' && <Tecnico eventos={eventos} />}
                            {vista === 'prensa' && <Prensa eventos={eventos} />}
                        </div>
                    </main>
                </div>
            );
        }

        // --- MÓDULOS ---

        // 1. DASHBOARD TÁCTICO (MAPA EN VIVO)
        function Dashboard({ eventos, autoridades, moviles }) {
            const mapRef = useRef(null);
            const markersRef = useRef({}); // Para guardar referencia de marcadores y actualizarlos

            // Inicializar Mapa
            useEffect(() => {
                if(document.getElementById('mapa-global') && !mapRef.current) {
                    const map = L.map('mapa-global').setView([-29.9045, -71.2550], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap &copy; CARTO'
                    }).addTo(map);
                    mapRef.current = map;
                }
            }, []);

            // Actualizar Marcadores (Eventos y Móviles)
            useEffect(() => {
                const map = mapRef.current;
                if (!map) return;

                // Limpiar marcadores antiguos (manera simple para este prototipo)
                map.eachLayer((layer) => {
                    if (layer instanceof L.Marker) { map.removeLayer(layer); }
                });

                // 1. Poner Eventos (Pulsantes)
                eventos.forEach(ev => {
                    if(ev.coords) {
                        const pulseIcon = L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div class='pulse-icon'></div>`,
                            iconSize: [20, 20],
                            iconAnchor: [10, 10]
                        });
                        L.marker(ev.coords, { icon: pulseIcon }).addTo(map)
                            .bindPopup(`<b>${ev.nombre}</b><br>EN CURSO`);
                    }
                });

                // 2. Poner Móviles (Moviéndose)
                moviles.forEach(mov => {
                    let emoji = '🚓';
                    let cssClass = 'movil-icon';
                    if (mov.tipo === 'produccion') { emoji = '🚚'; cssClass += ' movil-prod'; }
                    if (mov.tipo === 'oficial') { emoji = '🚙'; }

                    const carIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class='${cssClass}'>${emoji}</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    });
                    
                    L.marker([mov.lat, mov.lng], { icon: carIcon }).addTo(map)
                        .bindPopup(`<b>${mov.nombre}</b><br>GPS Activo`);
                });

            }, [eventos, moviles]); // Se ejecuta cada vez que los móviles cambian de posición
            
            const presentes = autoridades.filter(a => a.estado === 'presente').length;

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <StatCard label="Eventos Activos" val={eventos.length} icon="Radio" color="bg-red-600 animate-pulse" />
                        <StatCard label="Unidades en Terreno" val={moviles.length} icon="Car" color="bg-blue-600" />
                        <StatCard label="VIP en Sala" val={`${presentes}/${autoridades.length}`} icon="Users" color="bg-ls-stone" />
                        <StatCard label="Alertas" val="0" icon="CheckCircle" color="bg-green-600 hidden md:block" />
                    </div>
                    
                    <div className="bg-white p-1 rounded-2xl shadow-lg border border-gray-200 relative">
                        <div id="mapa-global" className="map-container rounded-xl h-[400px]"></div>
                        
                        {/* Leyenda del Mapa */}
                        <div className="absolute bottom-4 right-4 bg-white/90 p-3 rounded-lg shadow-md text-xs z-[500]">
                            <p className="font-bold mb-1">Simbología</p>
                            <div className="flex items-center gap-2 mb-1"><span className="w-3 h-3 rounded-full bg-red-500 border-2 border-white shadow"></span> Evento Activo</div>
                            <div className="flex items-center gap-2 mb-1">🚓 Seguridad</div>
                            <div className="flex items-center gap-2">🚚 Producción</div>
                        </div>
                    </div>
                </div>
            );
        }

        function Secretaria({ onGuardar }) {
            const [form, setForm] = useState({ nombre: '', fecha: '', lugar: 'Ed. Consistorial' });
            const guardar = (e) => {
                e.preventDefault();
                const coords = UBICACIONES[form.lugar] || [-29.9027, -71.2520];
                onGuardar({ ...form, id: Date.now(), coords });
                alert("Evento Sincronizado");
                setForm({ nombre: '', fecha: '', lugar: 'Ed. Consistorial' });
            };
            return (
                <div className="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
                    <h3 className="text-lg font-bold mb-4 text-gray-700">Nuevo Hito Protocolar</h3>
                    <form onSubmit={guardar} className="space-y-4">
                        <div><label className="label">Nombre Evento</label><input required className="input" placeholder="Ej: Cuenta Pública" value={form.nombre} onChange={e=>setForm({...form, nombre: e.target.value})} /></div>
                        <div><label className="label">Fecha Inicio</label><input required type="datetime-local" className="input" value={form.fecha} onChange={e=>setForm({...form, fecha: e.target.value})} /></div>
                        <div><label className="label">Lugar</label><select className="input" value={form.lugar} onChange={e=>setForm({...form, lugar: e.target.value})}>{Object.keys(UBICACIONES).map(u => <option key={u} value={u}>{u}</option>)}</select></div>
                        <button className="btn-primary w-full py-4 text-lg shadow-lg shadow-blue-900/20">Sincronizar Hito</button>
                    </form>
                </div>
            );
        }

        function Protocolo({ lista, setLista }) {
            const [filtro, setFiltro] = useState('Todos');
            const categorias = ['Todos', 'Regional', 'Municipal', 'Parlamentario', 'Concejo'];
            const filteredList = filtro === 'Todos' ? lista : lista.filter(a => a.categoria === filtro);
            const checkIn = (id) => setLista(lista.map(a => a.id === id ? { ...a, estado: a.estado === 'pendiente' ? 'presente' : 'pendiente' } : a));

            return (
                <div className="space-y-4">
                    <div className="flex gap-2 overflow-x-auto pb-2 scroll-hide">
                        {categorias.map(cat => (
                            <button key={cat} onClick={() => setFiltro(cat)} 
                                className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition-colors ${filtro === cat ? 'bg-ls-stone text-white' : 'bg-white text-gray-500 border border-gray-200'}`}>
                                {cat}
                            </button>
                        ))}
                    </div>
                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-3">
                        {filteredList.map(vip => (
                            <div key={vip.id} onClick={() => checkIn(vip.id)} className={`cursor-pointer p-4 rounded-xl border flex justify-between items-center bg-white transition-all active:scale-[0.98] ${vip.estado === 'presente' ? 'border-green-500 bg-green-50 ring-1 ring-green-500' : 'border-gray-200 hover:border-gray-300'}`}>
                                <div className="flex items-center gap-3">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm ${vip.estado === 'presente' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-400'}`}>
                                        {vip.nombre.charAt(0)}
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-gray-800 text-sm leading-tight">{vip.nombre}</h4>
                                        <p className="text-[10px] font-bold text-ls-red uppercase tracking-wide">{vip.cargo}</p>
                                        <p className="text-[10px] text-gray-400 italic">"{vip.vocativo}"</p>
                                    </div>
                                </div>
                                <div className={`p-2 rounded-full ${vip.estado === 'presente' ? 'bg-green-100 text-green-600' : 'bg-gray-50 text-gray-300'}`}>
                                    <i data-lucide={vip.estado === 'presente' ? 'Check' : 'Plus'} size="20"></i>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Tecnico({ eventos }) {
            return (
                <div className="grid grid-cols-1 gap-6">
                    {eventos.map(ev => <CronometroCard key={ev.id} evento={ev} />)}
                    {eventos.length === 0 && <div className="text-center p-10 border-2 border-dashed border-gray-300 rounded-xl text-gray-400">Sin eventos activos</div>}
                </div>
            );
        }

        const CronometroCard = ({ evento }) => {
            const [timeLeft, setTimeLeft] = useState("");
            const [status, setStatus] = useState("pending");

            useEffect(() => {
                const interval = setInterval(() => {
                    const diff = new Date(evento.fecha) - new Date();
                    if (diff < 0) { setTimeLeft("EN CURSO"); setStatus("running"); } 
                    else {
                        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);
                        setTimeLeft(`${d}d ${h}h ${m}m ${s}s`);
                        setStatus("pending");
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [evento]);

            return (
                <div className="bg-ls-stone text-white rounded-2xl p-6 shadow-2xl border-t-4 border-ls-red relative overflow-hidden">
                    <div className="flex justify-between mb-4">
                        <span className={`text-[10px] font-bold px-3 py-1 rounded-full ${status === 'running' ? 'bg-ls-red animate-pulse' : 'bg-blue-600'}`}>
                            {status === 'running' ? '● AL AIRE' : 'PRÓXIMO'}
                        </span>
                        <span className="text-xs font-mono text-gray-400">{new Date(evento.fecha).toLocaleDateString()}</span>
                    </div>
                    <h3 className="text-2xl font-bold leading-none mb-1">{evento.nombre}</h3>
                    <p className="text-xs text-gray-400 mb-8 flex items-center gap-1"><i data-lucide="MapPin" size="12"></i> {evento.lugar}</p>
                    <div className="bg-black/40 rounded-xl p-4 text-center border border-white/5 backdrop-blur-sm">
                        <span className="text-4xl md:text-6xl font-mono font-bold text-ls-gold tracking-tight">{timeLeft}</span>
                        <p className="text-[9px] uppercase tracking-[0.4em] text-gray-500 mt-2">Cuenta Regresiva</p>
                    </div>
                </div>
            )
        }

        function Prensa({ eventos }) {
            const [selected, setSelected] = useState(eventos[0]);
            return (
                <div className="flex flex-col md:flex-row h-[600px] bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden">
                    <div className="w-full md:w-1/3 bg-gray-50 border-r border-gray-200 p-4">
                        <h3 className="text-xs font-bold text-gray-400 uppercase mb-3">Eventos Disponibles</h3>
                        <div className="space-y-2">
                            {eventos.map(ev => (
                                <button key={ev.id} onClick={() => setSelected(ev)} className={`w-full text-left p-3 rounded-lg text-sm transition-all ${selected?.id === ev.id ? 'bg-ls-stone text-white shadow-md' : 'hover:bg-gray-200 text-gray-700'}`}>
                                    <span className="font-bold block">{ev.nombre}</span>
                                    <span className="text-xs opacity-70">{new Date(ev.fecha).toLocaleDateString()}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                    <div className="w-full md:w-2/3 p-6 overflow-y-auto">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-bold text-gray-800">{selected?.nombre}</h2>
                            <button className="bg-ls-red text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 hover:bg-red-800 transition">
                                <i data-lucide="UploadCloud"></i> Subir
                            </button>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                            {[1,2,3,4,5,6].map(i => (
                                <div key={i} className="aspect-video bg-gray-100 rounded-lg border border-gray-200 flex items-center justify-center cursor-pointer hover:bg-gray-200 transition">
                                    <i data-lucide="Image" className="text-gray-300"></i>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            )
        }

        // UTILS
        const MenuBtn = ({ id, icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl mb-1 transition-all ${active ? 'bg-ls-red text-white shadow-lg' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}`}>
                <i data-lucide={icon} size="20"></i>
