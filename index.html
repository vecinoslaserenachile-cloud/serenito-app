<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.R.E.N.I.T.O. | Sistema Integrado 2026</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2210%22 fill=%22%23b91c1c%22 /><text x=%2250%22 y=%2275%22 font-family=%22Arial%22 font-size=%2270%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>S</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'ls-red': '#b91c1c', 'ls-red-dark': '#7f1d1d', 'ls-yellow': '#facc15', 'ls-gray': '#f8fafc',
            },
            animation: {
              'marquee': 'marquee 35s linear infinite',
            },
            keyframes: {
              marquee: { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(-100%)' } }
            }
          }
        }
      }
    </script>
    <style>
        .map-container { height: 100%; min-height: 400px; width: 100%; border-radius: 0.5rem; z-index: 1; }
        .pulse-icon { background-color: #b91c1c; border-radius: 50%; width: 20px; height: 20px; border: 3px solid white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(185, 28, 28, 0); } }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(4px); }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-ls-gray text-slate-800 overflow-x-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- DATOS SEMILLA ---
        const EVENTOS_BASE = [
            { 
                id: 1, nombre: "Inauguración Plaza de Armas", fecha: "2026-04-28T11:00", lugar: "Plaza de Armas", direccion: "Gregorio Cordovez #400", coords: [-29.9027, -71.2520], estado: "En Desarrollo", responsable: "Arq. María González", 
                checklist: [{ id: 1, tarea: "Corte de Cinta", listo: false }, { id: 2, tarea: "Audio", listo: true }] 
            },
            { 
                id: 2, nombre: "Campeonato Escolar", fecha: "2026-05-02T09:00", lugar: "Estadio La Portada", direccion: "Av. Estadio #100", coords: [-29.912, -71.256], estado: "Pendiente", responsable: "Juan Pérez", 
                checklist: [{ id: 1, tarea: "Arbitraje", listo: false }, { id: 2, tarea: "Agua", listo: false }] 
            }
        ];

        function SerenitoApp() {
            // ESTADOS GLOBALES
            const [vista, setVista] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [autoridades, setAutoridades] = useState([]);
            const [eventos, setEventos] = useState(EVENTOS_BASE);
            const [locutorNombre, setLocutorNombre] = useState("");
            const [errorCarga, setErrorCarga] = useState(null);

            // CARGA INTELIGENTE (JSON + LOCALSTORAGE para persistencia en demo)
            useEffect(() => {
                const storedAuth = localStorage.getItem('serenito_auth_v1');
                if (storedAuth) {
                    setAutoridades(JSON.parse(storedAuth));
                } else {
                    fetch('autoridades_coquimbo_2026.json')
                        .then(res => res.ok ? res.json() : Promise.reject("Error JSON"))
                        .then(data => {
                            const sorted = data.sort((a, b) => a.precedencia - b.precedencia);
                            setAutoridades(sorted);
                            localStorage.setItem('serenito_auth_v1', JSON.stringify(sorted));
                        })
                        .catch(err => setErrorCarga("⚠️ Error cargando DB JSON."));
                }
            }, []);

            // Guardar cambios en LocalStorage automáticamente
            useEffect(() => {
                if (autoridades.length > 0) localStorage.setItem('serenito_auth_v1', JSON.stringify(autoridades));
            }, [autoridades]);

            const navegar = (v) => { setVista(v); setMenuOpen(false); }
            const cerrarSesion = () => { if(confirm("¿Cerrar sesión?")) alert("Sesión finalizada"); }

            return (
                <div className="flex h-screen flex-col md:flex-row overflow-hidden bg-slate-50">
                    
                    {/* SIDEBAR */}
                    <aside className={`fixed inset-y-0 left-0 z-40 w-72 bg-white border-r border-gray-200 transform transition-transform duration-300 ease-in-out flex flex-col shadow-2xl ${menuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0`}>
                        <div className="p-8 flex flex-col items-center bg-ls-red text-white">
                            <div className="w-14 h-14 bg-white rounded-full flex items-center justify-center font-black text-3xl text-ls-red shadow-lg mb-2 border-4 border-ls-yellow">S</div>
                            <h1 className="text-xl font-black tracking-tighter">S.E.R.E.N.I.T.O.</h1>
                            <p className="text-[10px] uppercase font-bold text-ls-yellow mt-1">Gestión 2026</p>
                        </div>
                        <nav className="flex-1 py-4 px-4 space-y-1 overflow-y-auto bg-gray-50">
                            <Label text="Centro de Mando" />
                            <MenuBtn icon="Map" label="Despliegue Territorial" active={vista==='dashboard'} onClick={()=>navegar('dashboard')} />
                            <MenuBtn icon="CalendarPlus" label="Secretaría & Hitos" active={vista==='secretaria'} onClick={()=>navegar('secretaria')} />
                            
                            <Label text="Operación Live" />
                            <MenuBtn icon="Award" label="Protocolo (Puerta)" active={vista==='protocolo'} onClick={()=>navegar('protocolo')} />
                            <MenuBtn icon="Mic2" label="Pantalla Locutor" active={vista==='locutor'} onClick={()=>navegar('locutor')} />
                            <MenuBtn icon="Settings" label="Técnica (Multi-Evento)" active={vista==='tecnica'} onClick={()=>navegar('tecnica')} />
                            
                            <Label text="Administración" />
                            <MenuBtn icon="Database" label="Gestión de Autoridades" active={vista==='admin'} onClick={()=>navegar('admin')} />
                        </nav>
                        <div className="p-4 border-t border-gray-200">
                            <button onClick={cerrarSesion} className="w-full flex items-center justify-center gap-2 p-2 rounded-lg bg-red-50 text-red-600 font-bold hover:bg-red-100 transition text-xs uppercase"><i data-lucide="LogOut" size={14}></i> Salir</button>
                        </div>
                    </aside>

                    {/* BARRA MÓVIL */}
                    <div className="md:hidden bg-ls-red text-white p-4 flex justify-between items-center z-50 shadow-md">
                        <span className="font-bold">S.E.R.E.N.I.T.O.</span>
                        <button onClick={() => setMenuOpen(!menuOpen)}><i data-lucide="Menu"></i></button>
                    </div>

                    {/* MAIN */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-6 w-full relative flex flex-col">
                        <div className="flex-1 pb-16">
                            {errorCarga && <div className="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm border border-red-200">{errorCarga}</div>}
                            
                            {vista === 'dashboard' && <Dashboard eventos={eventos} />}
                            {vista === 'secretaria' && <Secretaria onGuardar={(nuevo) => setEventos([...eventos, nuevo])} />}
                            {vista === 'protocolo' && <Protocolo autoridades={autoridades} setAutoridades={setAutoridades} />}
                            {vista === 'locutor' && <div className="h-full flex flex-col"><VistaLocutor autoridades={autoridades} nombreLocutor={locutorNombre} setNombreLocutor={setLocutorNombre} /></div>}
                            {vista === 'tecnica' && <Tecnica eventos={eventos} setEventos={setEventos} />}
                            {vista === 'admin' && <AdminView autoridades={autoridades} setAutoridades={setAutoridades} />}
                        </div>
                        <Wincha autoridades={autoridades} eventos={eventos} />
                    </main>
                </div>
            );
        }

        // --- COMPONENTES PRINCIPALES ---

        // 1. DESPLIEGUE TERRITORIAL (Mapa Central)
        function Dashboard({ eventos }) {
            const mapRef = useRef(null);
            useEffect(() => {
                if(!mapRef.current && document.getElementById('mapa-tactico')) {
                    const map = L.map('mapa-tactico').setView([-29.9045, -71.2550], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
                    eventos.forEach(ev => {
                        const icon = L.divIcon({ className: '', html: `<div class="pulse-icon"></div>` });
                        L.marker(ev.coords, {icon}).addTo(map).bindPopup(`<b>${ev.nombre}</b><br>${ev.direccion}`);
                    });
                    mapRef.current = map;
                }
            }, [eventos]);
            return (
                <div className="h-full flex flex-col gap-4">
                    <h2 className="text-2xl font-black text-ls-red uppercase flex gap-2"><i data-lucide="Map"></i> Despliegue Territorial</h2>
                    <div className="relative flex-1 rounded-2xl overflow-hidden shadow-xl border-4 border-white">
                        <div id="mapa-tactico" className="map-container"></div>
                        <div className="absolute top-4 right-4 glass p-3 rounded-xl shadow-lg z-[500]">
                            <h4 className="text-[10px] font-black text-ls-red uppercase mb-1">Hitos Activos</h4>
                            <div className="text-2xl font-bold text-gray-800">{eventos.length}</div>
                        </div>
                    </div>
                </div>
            );
        }

        // 2. SECRETARÍA (Georeferenciación)
        function Secretaria({ onGuardar }) {
            const [form, setForm] = useState({ nombre: '', responsable: '', fecha: '', coords: null, direccion: '' });
            const mapRef = useRef(null);

            useEffect(() => {
                if(!mapRef.current && document.getElementById('mapa-geo')) {
                    const map = L.map('mapa-geo').setView([-29.9045, -71.2550], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
                    let marker;
                    map.on('click', (e) => {
                        if(marker) map.removeLayer(marker);
                        marker = L.marker(e.latlng).addTo(map);
                        // Simulador de dirección
                        const calles = ["Av. del Mar", "Balmaceda", "Cordovez", "4 Esquinas"];
                        const dir = `${calles[Math.floor(Math.random()*calles.length)]} #${Math.floor(Math.random()*5000)}`;
                        setForm(prev => ({ ...prev, coords: [e.latlng.lat, e.latlng.lng], direccion: dir }));
                    });
                    mapRef.current = map;
                }
            }, []);

            const guardar = (e) => {
                e.preventDefault();
                if(!form.coords) return alert("¡Falta georeferencia! Haga clic en el mapa.");
                onGuardar({ ...form, id: Date.now(), checklist: [{id:1, tarea: "Instalación", listo: false}], estado: "Pendiente", lugar: "Ubicación Mapa" });
                alert("Evento creado correctamente");
                setForm({ nombre: '', responsable: '', fecha: '', coords: null, direccion: '' });
            }

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-full">
                    <div className="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-ls-red">
                        <h2 className="text-xl font-black mb-4 text-ls-red flex gap-2"><i data-lucide="PenTool"></i> Nuevo Hito</h2>
                        <form onSubmit={guardar} className="space-y-3">
                            <input required className="w-full p-3 bg-gray-50 border rounded-lg" value={form.nombre} onChange={e=>setForm({...form, nombre:e.target.value})} placeholder="Nombre del Evento" />
                            <input required className="w-full p-3 bg-gray-50 border rounded-lg" value={form.responsable} onChange={e=>setForm({...form, responsable:e.target.value})} placeholder="Responsable (Nombre)" />
                            <input type="datetime-local" required className="w-full p-3 bg-gray-50 border rounded-lg" value={form.fecha} onChange={e=>setForm({...form, fecha:e.target.value})} />
                            <div className="bg-blue-50 p-3 rounded text-sm text-blue-800 border border-blue-100 flex gap-2 items-center">
                                <i data-lucide="MapPin" size={16}></i> {form.direccion || "Seleccione un punto en el mapa ->"}
                            </div>
                            <button className="w-full bg-ls-red text-white font-bold py-3 rounded-xl shadow-md hover:bg-red-800 transition">Registrar Hito</button>
                        </form>
                    </div>
                    <div className="rounded-2xl overflow-hidden shadow-lg border border-gray-200 relative">
                        <div className="absolute top-2 left-2 bg-white/90 px-2 py-1 rounded text-xs font-bold z-[500]">Click para georeferenciar</div>
                        <div id="mapa-geo" className="map-container"></div>
                    </div>
                </div>
            );
        }

        // 3. PROTOCOLO (Check-in Masivo)
        function Protocolo({ autoridades, setAutoridades }) {
            const [filtro, setFiltro] = useState("");
            const filtrados = autoridades.filter(a => a.nombre.toLowerCase().includes(filtro.toLowerCase()) || a.cargo.toLowerCase().includes(filtro.toLowerCase()));
            
            return (
                <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 h-full">
                    <div className="xl:col-span-2 bg-white p-6 rounded-2xl shadow-lg border border-gray-100 flex flex-col">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="font-black text-xl text-ls-red flex gap-2"><i data-lucide="UserCheck"></i> Acreditación</h2>
                            <span className="text-xs bg-gray-100 px-2 py-1 rounded border">BD: {autoridades.length}</span>
                        </div>
                        <input className="w-full p-3 border rounded-xl mb-4 bg-gray-50" placeholder="Buscar autoridad..." value={filtro} onChange={e=>setFiltro(e.target.value)} />
                        <div className="flex-1 overflow-y-auto pr-2 space-y-2 scroll-hide">
                            {filtrados.map(vip => (
                                <div key={vip.id} onClick={() => setAutoridades(autoridades.map(a => a.id === vip.id ? { ...a, presente: !a.presente } : a))} className={`p-3 rounded-lg border cursor-pointer flex justify-between items-center transition ${vip.presente ? 'bg-red-50 border-ls-red ring-1 ring-ls-red' : 'hover:bg-gray-50'}`}>
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-gray-200 overflow-hidden border">
                                            {vip.foto ? <img src={vip.foto} className="avatar-img" /> : <span className="w-full h-full flex items-center justify-center font-bold text-gray-500">{vip.nombre.charAt(0)}</span>}
                                        </div>
                                        <div><p className="font-bold text-sm">{vip.nombre}</p><p className="text-[10px] uppercase text-ls-red font-bold">{vip.cargo}</p></div>
                                    </div>
                                    <i data-lucide={vip.presente ? 'Check' : 'Plus'} className={vip.presente ? 'text-ls-red' : 'text-gray-300'}></i>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="xl:col-span-1 h-full"><VistaLocutor autoridades={autoridades} nombreLocutor="" soloLectura={true} /></div>
                </div>
            );
        }

        // 4. LOCUTOR (Recuperado y Legible)
        function VistaLocutor({ autoridades, nombreLocutor, setNombreLocutor, soloLectura }) {
            const presentes = autoridades.filter(a => a.presente).sort((a, b) => a.precedencia - b.precedencia);
            return (
                <div className="bg-white p-6 rounded-2xl shadow-2xl border-t-8 border-ls-red h-full flex flex-col">
                    <div className="flex justify-between items-center mb-4 border-b pb-4">
                        <h3 className="text-ls-red font-black text-xl uppercase flex gap-2"><i data-lucide="Mic2"></i> Pantalla Live</h3>
                        <span className="bg-ls-yellow text-yellow-900 px-2 py-1 rounded text-xs font-bold animate-pulse">EN VIVO</span>
                    </div>
                    {!soloLectura && <input className="w-full bg-gray-50 p-2 rounded border mb-4 font-bold text-center" placeholder="NOMBRE DEL LOCUTOR..." value={nombreLocutor} onChange={e=>setNombreLocutor(e.target.value)} />}
                    <div className="flex-1 bg-gray-50 p-4 rounded-xl border overflow-y-auto">
                        {nombreLocutor && <p className="text-xs text-right mb-2 font-bold text-gray-400">🎙️ {nombreLocutor}</p>}
                        {presentes.length === 0 ? <p className="text-center text-gray-400 mt-10 italic">Esperando autoridades...</p> : (
                            <>
                                <div className="p-4 bg-white rounded-lg border-l-4 border-ls-red shadow-sm mb-4">
                                    <p className="text-xs text-gray-400 uppercase font-bold mb-1">Preside:</p>
                                    <p className="text-lg font-black leading-tight">Saludamos a <span className="text-ls-red">{presentes[0].vocativo} {presentes[0].nombre}</span>, {presentes[0].cargo}.</p>
                                </div>
                                {presentes.length > 1 && <ul className="space-y-3 pl-2">{presentes.slice(1).map(p => <li key={p.id} className="text-sm font-bold text-gray-700 flex gap-2"><span className="text-ls-red">•</span> {p.vocativo} {p.nombre}, {p.cargo}.</li>)}</ul>}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        // 5. TÉCNICA (Multi-Eventos + Checklist)
        function Tecnica({ eventos, setEventos }) {
            const [sel, setSel] = useState(eventos[0]);
            
            const toggle = (taskId) => {
                const nuevoCheck = sel.checklist.map(t => t.id === taskId ? { ...t, listo: !t.listo } : t);
                const actualizado = { ...sel, checklist: nuevoCheck };
                setEventos(eventos.map(ev => ev.id === sel.id ? actualizado : ev));
                setSel(actualizado);
            }

            const agregarManual = () => {
                const texto = prompt("Nombre de la nueva tarea:");
                if(texto) {
                    const actualizado = { ...sel, checklist: [...sel.checklist, { id: Date.now(), tarea: texto, listo: false }] };
                    setEventos(eventos.map(ev => ev.id === sel.id ? actualizado : ev));
                    setSel(actualizado);
                }
            }

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                    {/* Lista Eventos */}
                    <div className="lg:col-span-1 space-y-3 overflow-y-auto pr-2 border-r border-gray-100">
                        <h2 className="font-black text-lg text-ls-red mb-2">Seleccionar Evento</h2>
                        {eventos.map(ev => (
                            <div key={ev.id} onClick={() => setSel(ev)} className={`p-4 rounded-xl cursor-pointer border transition-all ${sel.id === ev.id ? 'bg-ls-red text-white shadow-md' : 'bg-white hover:bg-gray-50 border-gray-200'}`}>
                                <h3 className="font-bold text-sm">{ev.nombre}</h3>
                                <div className="flex justify-between mt-2 text-[10px] opacity-80"><span>{ev.responsable}</span><span>{ev.checklist.filter(t=>t.listo).length}/{ev.checklist.length} OK</span></div>
                            </div>
                        ))}
                    </div>
                    {/* Checklist Específico */}
                    <div className="lg:col-span-2 bg-white p-6 rounded-2xl shadow-lg border-t-4 border-ls-yellow flex flex-col">
                         <div className="flex justify-between items-start mb-4">
                             <h2 className="font-black text-xl">{sel.nombre}</h2>
                             <button onClick={agregarManual} className="bg-gray-100 p-2 rounded-lg hover:bg-gray-200 text-xs font-bold flex gap-1"><i data-lucide="PlusSquare" size={14}></i> Agregar Tarea</button>
                         </div>
                         <div className="space-y-2 flex-1 overflow-y-auto">
                            {sel.checklist.map(t => (
                                <div key={t.id} onClick={() => toggle(t.id)} className={`p-3 rounded-lg border cursor-pointer flex justify-between items-center ${t.listo ? 'bg-green-50 border-green-500 text-green-700' : 'bg-white hover:bg-gray-50'}`}>
                                    <span className={`text-sm font-bold ${t.listo ? 'line-through' : ''}`}>{t.tarea}</span>
                                    {t.listo ? <i data-lucide="CheckCircle2" size={18}></i> : <div className="w-4 h-4 rounded-full border-2 border-gray-300"></div>}
                                </div>
                            ))}
                         </div>
                    </div>
                </div>
            )
        }

        // 6. ADMIN (Agregar/Editar + Fotos)
        function AdminView({ autoridades, setAutoridades }) {
            const [modo, setModo] = useState('lista'); 
            const [form, setForm] = useState({});

            const guardar = (e) => {
                e.preventDefault();
                let nuevo;
                if(autoridades.find(a => a.id === form.id)) {
                    nuevo = autoridades.map(a => a.id === form.id ? form : a);
                } else {
                    nuevo = [...autoridades, form];
                }
                setAutoridades(nuevo.sort((a,b)=>a.precedencia-b.precedencia));
                setModo('lista');
            }

            const leerFoto = (e) => {
                const file = e.target.files[0];
                if(file){
                    const reader = new FileReader();
                    reader.onloadend = () => setForm({...form, foto: reader.result});
                    reader.readAsDataURL(file);
                }
            }

            if(modo === 'editar') {
                return (
                    <div className="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
                        <h2 className="font-black text-xl mb-4">Editar / Crear Autoridad</h2>
                        <form onSubmit={guardar} className="space-y-3">
                            <div className="flex gap-4 items-center">
                                <div className="w-16 h-16 bg-gray-100 rounded-full overflow-hidden border relative group">
                                    {form.foto ? <img src={form.foto} className="avatar-img" /> : <div className="w-full h-full flex items-center justify-center text-gray-400"><i data-lucide="Camera"></i></div>}
                                    <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" onChange={leerFoto} accept="image/*" />
                                </div>
                                <div className="flex-1"><input required className="w-full p-2 border rounded" value={form.nombre} onChange={e=>setForm({...form, nombre:e.target.value})} placeholder="Nombre" /></div>
                            </div>
                            <input className="w-full p-2 border rounded" value={form.cargo} onChange={e=>setForm({...form, cargo:e.target.value})} placeholder="Cargo" />
                            <div className="grid grid-cols-2 gap-3">
                                <input type="number" className="p-2 border rounded" value={form.precedencia} onChange={e=>setForm({...form, precedencia:Number(e.target.value)})} placeholder="Rango (1-100)" />
                                <input className="p-2 border rounded" value={form.vocativo} onChange={e=>setForm({...form, vocativo:e.target.value})} placeholder="Vocativo" />
                            </div>
                            <div className="flex gap-2 pt-4">
                                <button className="flex-1 bg-ls-red text-white py-2 rounded-lg font-bold">Guardar</button>
                                <button type="button" onClick={()=>setModo('lista')} className="px-4 py-2 bg-gray-100 rounded-lg">Cancelar</button>
                            </div>
                        </form>
                    </div>
                )
            }

            return (
                <div className="bg-white p-6 rounded-2xl shadow-lg h-full flex flex-col">
                    <div className="flex justify-between mb-4">
                        <h2 className="font-black text-xl">Base de Datos</h2>
                        <button onClick={()=>{setForm({id:Date.now(), nombre:'', cargo:'', precedencia:99, presente:false, foto:''}); setModo('editar')}} className="bg-ls-red text-white px-3 py-1 rounded-lg text-sm font-bold flex gap-2 items-center"><i data-lucide="Plus"></i> Nueva</button>
                    </div>
                    <div className="flex-1 overflow-y-auto space-y-2">
                        {autoridades.map(vip => (
                            <div key={vip.id} className="p-3 border rounded-lg flex justify-between items-center">
                                <div className="flex gap-3 items-center">
                                    <div className="w-8 h-8 rounded-full bg-gray-100 overflow-hidden">{vip.foto && <img src={vip.foto} className="avatar-img" />}</div>
                                    <div><p className="font-bold text-sm">{vip.nombre}</p><p className="text-xs text-gray-500">{vip.cargo}</p></div>
                                </div>
                                <button onClick={()=>{setForm(vip); setModo('editar')}} className="text-blue-600 p-2"><i data-lucide="Edit2" size={16}></i></button>
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        // UTILS
        const Label = ({text}) => <p className="px-3 text-[10px] font-bold text-gray-400 uppercase mb-2 mt-4">{text}</p>;
        const MenuBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg mb-1 transition-all ${active ? 'bg-ls-red text-white shadow-md' : 'text-gray-500 hover:bg-red-50 hover:text-ls-red'}`}><i data-lucide={icon} size={18}></i><span className="text-xs font-bold uppercase">{label}</span></button>
        );
        const Wincha = ({ autoridades, eventos }) => {
            const txt = autoridades.filter(a=>a.presente).map(a=>`🟢 ${a.cargo} ${a.nombre}`).join("   |   ") + "   |   " + eventos.filter(e=>e.estado==="En Desarrollo").map(e=>`📢 ${e.nombre}`).join("   |   ");
            return (
                <div className="fixed bottom-0 left-0 md:left-72 right-0 bg-ls-red text-white h-8 flex items-center overflow-hidden z-50 border-t-2 border-ls-yellow">
                    <div className="bg-red-900 px-3 h-full flex items-center text-[10px] font-black uppercase z-10">En Vivo</div>
                    <div className="whitespace-nowrap animate-marquee pl-4 text-xs font-bold">{txt || "Sistema Operativo - Esperando datos..."}</div>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SerenitoApp />);
        setTimeout(() => lucide.createIcons(), 500);
        setInterval(() => lucide.createIcons(), 2000);
    </script>
</body>
</html>
