<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.R.E.N.I.T.O. | Gestión Interna de Eventos y Protocolo</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2210%22 fill=%22%23b91c1c%22 /><text x=%2250%22 y=%2275%22 font-family=%22Arial%22 font-size=%2270%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>S</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'ls-red': '#b91c1c',
              'ls-stone': '#292524',
              'ls-gold': '#d97706',
            }
          }
        }
      }
    </script>
    <style>
        .scroll-hide::-webkit-scrollbar { display: none; }
        .wincha-scroll { animation: marquee 30s linear infinite; } /* Velocidad ajustada para legibilidad */
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Base Masiva de Checklist default
        const DEFAULT_CHECKLIST = [
            { id: 1, tarea: "Confirmación de Silla Presidencial", listo: false },
            { id: 2, tarea: "Prueba de Audio y Micrófonos", listo: false },
            { id: 3, tarea: "Iluminación de Podio", listo: false },
            { id: 4, tarea: "Agua para oradores", listo: false },
            { id: 5, tarea: "Impresión de Guiones (Locutor)", listo: false },
            { id: 6, tarea: "Revisión de Climatización", listo: false },
            { id: 7, tarea: "Coordinación con Prensa", listo: false },
            { id: 8, tarea: "Check de Accesos y Seguridad", listo: false },
            { id: 9, tarea: "Confirmación de Catering (VIP)", listo: false },
            { id: 10, tarea: "Decoración Floral y Banderas", listo: false }
        ];

        function SerenitoApp() {
            const [vista, setVista] = useState('protocolo');
            const [autoridades, setAutoridades] = useState([]);
            const [menuOpen, setMenuOpen] = useState(false);
            const [checklist, setChecklist] = useState(DEFAULT_CHECKLIST);
            const [errorCarga, setErrorCarga] = useState(null);

            // Carga dinámica del JSON Masivo
            useEffect(() => {
                fetch('autoridades_coquimbo_2026.json')
                    .then(response => {
                        if (!response.ok) { throw new Error("Error cargando base de datos."); }
                        return response.json();
                    })
                    .then(data => {
                        const sorted = data.sort((a, b) => a.rango - b.rango);
                        setAutoridades(sorted);
                        setErrorCarga(null);
                    })
                    .catch(error => {
                        console.error("Critical: Fallo en carga del JSON.", error);
                        setErrorCarga("Error cargando base de datos. Verifique 'autoridades_coquimbo_2026.json'");
                    });
            }, []);

            return (
                <div className="flex h-screen flex-col md:flex-row overflow-hidden font-sans">
                    
                    {/* BARRA MÓVIL SIMULADA (Mínimo requerido) */}
                    <div className="md:hidden bg-ls-stone text-white p-4 flex justify-between items-center shadow-md z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-ls-red rounded flex items-center justify-center font-bold">S</div>
                            <span className="font-bold tracking-tighter">S.E.R.E.N.I.T.O.</span>
                        </div>
                        <button onClick={() => setMenuOpen(!menuOpen)}>
                            <i data-lucide={menuOpen ? "X" : "Menu"} size="28"></i>
                        </button>
                    </div>

                    {/* SIDEBAR */}
                    <aside className={`fixed inset-y-0 left-0 z-40 w-72 bg-ls-stone text-white transform transition-transform duration-300 ease-in-out shadow-2xl ${menuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 md:flex md:flex-col`}>
                        <div className="p-6 flex flex-col items-center border-b border-gray-700 bg-gray-900/20">
                            <div className="w-14 h-14 bg-ls-red rounded-xl flex items-center justify-center font-black text-4xl shadow-lg mb-3 border-2 border-white/10">S</div>
                            <h1 className="text-xl font-black tracking-tighter">S.E.R.E.N.I.T.O.</h1>
                            <p className="text-[10px] uppercase tracking-widest text-ls-gold font-bold mt-1">Gestión Interna Live Ops</p>
                        </div>
                        
                        <nav className="flex-1 py-6 space-y-1 px-3 mt-14 md:mt-0">
                            <div className="px-3 text-[10px] font-bold text-gray-500 uppercase mb-2">Operación Actual</div>
                            <NavBtn icon="Award" label="Protocolo (Check-in)" active={vista === 'protocolo'} onClick={() => { setVista('protocolo'); setMenuOpen(false); }} />
                            <NavBtn icon="Mic2" label="Pestaña Locutor" active={vista === 'locutor'} onClick={() => { setVista('locutor'); setMenuOpen(false); }} />
                            <NavBtn icon="Settings" label="Técnica (Haz-in)" active={vista === 'tecnica'} onClick={() => { setVista('tecnica'); setMenuOpen(false); }} />
                            
                            <div className="px-3 text-[10px] font-bold text-gray-400 uppercase mb-2 mt-6">Administración</div>
                            <NavBtn icon="Database" label="Administración Base" active={vista === 'admin_base'} onClick={() => { setVista('admin_base'); setMenuOpen(false); }} />
                        </nav>

                        <div className="p-4 bg-gray-900/50 text-xs text-gray-400 border-t border-gray-800 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-ls-gold text-white flex items-center justify-center font-bold">RG</div>
                                <div>
                                    <p className="font-bold text-white">Rodrigo Godoy</p>
                                    <p className="text-green-400 text-[10px]">● Online</p>
                                </div>
                            </div>
                            <button className="text-gray-500 hover:text-white"><i data-lucide="LogOut" size="16"></i></button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto bg-slate-50 relative flex flex-col">
                        
                        {/* HEADER PRINCIPAL */}
                        <header className="flex justify-between items-center p-4 md:p-8 bg-white shadow-sm border-b border-gray-100 z-10">
                            <div className="flex items-center gap-3">
                                <i data-lucide="Radio" className="text-ls-red"></i>
                                <h2 className="text-xl md:text-3xl font-black text-ls-stone uppercase tracking-tight">CONTROL PROTOCOLAR TOTAL COQUIMBO 2026</h2>
                            </div>
                            <div className="hidden md:block text-right">
                                <p className="text-sm font-bold tracking-tight text-gray-500 bg-white px-3 py-1 rounded-full shadow-inner border border-gray-100">
                                    Base DB: {autoridades.length > 0 ? `${autoridades.length} Autoridades` : 'Cargando...'}
                                </p>
                            </div>
                        </header>

                        {/* ERROR CARGA */}
                        {errorCarga && <div className="bg-red-100 text-red-700 p-4 font-bold text-center m-4 md:m-8 rounded-xl shadow-inner border border-red-200">{errorCarga}</div>}

                        {/* RENDER VISTAS */}
                        <div className="flex-1 p-4 md:p-8 pb-20"> {/* pb-20 para dar espacio a la wincha */}
                            {vista === 'protocolo' && <ProtocoloView autoridades={autoridades} setAutoridades={setAutoridades} />}
                            {vista === 'locutor' && <LocutorView autoridades={autoridades} />}
                            {vista === 'tecnica' && <TecnicaView checklist={checklist} setChecklist={setChecklist} />}
                            {vista === 'admin_base' && <AdminBaseView autoridades={autoridades} setAutoridades={setAutoridades} />}
                        </div>

                        {/* WINCHA AMERICANA (Smarter & Ticker) */}
                        <WinchaInformativa autoridades={autoridades} />
                    </main>
                </div>
            );
        }

        // COMPONENTE NAV BUTTON
        const NavBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg mb-1.5 transition-all text-xs font-semibold ${active ? 'bg-ls-red text-white shadow-lg ring-1 ring-white/10' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}`}>
                <i data-lucide={icon} size="16"></i> {label}
            </button>
        );

        // COMPONENTE WINCHA AMERICANA (Ticker)
        const WinchaInformativa = ({ autoridades }) => {
            const presentes = autoridades.filter(a => a.presente);
            
            const textoScrolling = presentes.length > 0 
                ? presentes.map(a => `${a.cargo.toUpperCase()} ${a.nombre.toUpperCase()}`).join(" ... ")
                : "Esperando acreditación de autoridades en ProtoGate...";

            const dobleTexto = `${textoScrolling} ... ${textoScrolling}`;

            return (
                <div className="fixed bottom-0 left-0 md:left-72 right-0 bg-ls-red text-white h-10 md:h-12 flex items-center overflow-hidden z-50 shadow-inner border-t-2 border-gray-900/50">
                    <div className="bg-ls-red-dark h-full px-4 md:px-6 flex items-center font-black text-[9px] md:text-xs uppercase tracking-widest z-10 shadow-lg whitespace-nowrap">
                        <span className="animate-pulse mr-2 md:mr-3">●</span> En Vivo
                    </div>
                    <div className="flex-1 whitespace-nowrap font-semibold text-xs md:text-sm h-full flex items-center bg-ls-red relative">
                        <p className="wincha-scroll absolute whitespace-nowrap">
                            {dobleTexto}
                        </p>
                    </div>
                    <div className="bg-ls-stone h-full px-4 flex items-center text-[9px] uppercase tracking-widest z-10 shadow-lg text-gray-500 whitespace-nowrap">
                        S.E.R.E.N.I.T.O. Logic v7.0 (Total Coquimbo DB)
                    </div>
                </div>
            );
        }

        // --- VISTA: PROTOCOLO (Masivo) ---
        function ProtocoloView({ autoridades, setAutoridades }) {
            const [terminoBusqueda, setTerminoBusqueda] = useState("");
            const filtrados = autoridades.filter(a => a.nombre.toLowerCase().includes(terminoBusqueda.toLowerCase()) || a.cargo.toLowerCase().includes(terminoBusqueda.toLowerCase()));
            
            return (
                <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                    {/* Check-in Puerta */}
                    <div className="xl:col-span-2 space-y-4 bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100 flex flex-col h-[70vh]">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg md:text-2xl font-black text-ls-stone flex items-center gap-3"><i data-lucide="UserCheck" className="text-ls-red"></i> Acreditación Puerta (ProtoGate 2026)</h3>
                            <span className="text-xs font-mono font-bold tracking-tight text-gray-500 bg-gray-50 px-3 py-1 rounded-full shadow-inner border border-gray-100">{autoridades.filter(a => a.presente).length} Presentes</span>
                        </div>
                        
                        {/* Buscador */}
                        <div className="relative mb-6">
                            <i data-lucide="Search" className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" size="18"></i>
                            <input type="search" placeholder="Buscar por nombre, cargo o rango..." value={terminoBusqueda} onChange={e => setTerminoBusqueda(e.target.value)} className="w-full pl-12 pr-4 py-4 md:py-5 bg-slate-50 border border-gray-200 rounded-xl outline-none focus:border-ls-red focus:ring-1 focus:ring-ls-red text-base font-semibold" />
                        </div>

                        {/* Listado Masivo con Fotos */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4 h-full overflow-y-auto pr-3 scroll-hide">
                            {filtrados.map(vip => (
                                <div key={vip.id} onClick={() => { setAutoridades(autoridades.map(a => a.id === vip.id ? {...a, presente: !a.presente} : a)) }} className={`cursor-pointer p-4 md:p-5 rounded-xl border flex justify-between items-center transition-all ${vip.presente ? 'border-green-500 bg-green-50' : 'border-gray-200 hover:border-gray-300'}`}>
                                    <div className="flex items-center gap-3">
                                        <div className={`w-12 h-12 rounded-full overflow-hidden border-2 flex-shrink-0 flex items-center justify-center font-bold text-lg ${vip.presente ? 'bg-green-600 text-white border-green-700' : 'bg-gray-100 text-gray-400 border-gray-200'}`}>
                                            {vip.foto ? <img src={vip.foto} className="w-full h-full object-cover" /> : vip.nombre.charAt(0)}
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-ls-stone text-sm leading-tight flex items-center gap-2">
                                                {vip.nombre}
                                                <span className="text-[9px] font-mono font-normal text-gray-400 bg-gray-100 px-1 rounded">Rango {vip.rango}</span>
                                            </h4>
                                            <p className="text-[10px] font-bold text-ls-red uppercase tracking-wide">{vip.cargo}</p>
                                        </div>
                                    </div>
                                    <div className={`p-2 rounded-full border ${vip.presente ? 'bg-green-100 text-green-600' : 'bg-gray-50 text-gray-300'}`}>
                                        <i data-lucide={vip.presente ? 'Check' : 'Plus'} size="20"></i>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Resumen Lateral */}
                    <div className="xl:col-span-1 sticky top-8 h-fit">
                        <VistaLocutor autoridades={autoridades} miniature={true} />
                    </div>
                </div>
            );
        }

        // --- VISTA: LOCUTOR (Ajuste de legibilidad móvil) ---
        function VistaLocutor({ autoridades, miniature=false }) {
            const vocativosDinamicos = useMemo(() => {
                const presentes = autoridades.filter(a => a.presente);
                if (presentes.length === 0) {
                    return [{ texto: "Esperando acreditación de autoridades...", tipo: "alerta" }];
                }
                const preside = presentes[0];
                const vocativoPreside = `${preside.vocativo} ${preside.cargo} ${preside.nombre}.`;
                const lineas = [{ texto: `Saludamos a quien preside este acto, ` + vocativoPreside, tipo: "preside" }];
                if (presentes.length > 1) {
                    lineas.push({ texto: `Saludamos también a las siguientes autoridades presentes, ordenadas por estricto protocolo regional:`, tipo: "normal" });
                    presentes.slice(1).forEach(vip => {
                        lineas.push({ texto: `● ${vip.vocativo}, ${vip.cargo}, ${vip.nombre}.`, tipo: "lista" });
                    });
                }
                return lineas;
            }, [autoridades]);

            return (
                <div className={`bg-ls-stone text-white p-6 md:p-8 rounded-2xl shadow-2xl border-4 border-gray-900/50 min-h-[400px] flex flex-col ${miniature ? 'xl:h-[70vh]' : ''}`}>
                    <div className="flex justify-between items-center mb-6 border-b border-gray-800 pb-3">
                        <h3 className="text-ls-gold text-sm md:text-lg font-black uppercase flex items-center gap-2"><i data-lucide="Mic2"></i> PESTAÑA LOCUTOR (LIVE 2026)</h3>
                        <span className="text-[10px] md:text-xs text-ls-gold font-bold bg-gray-900 px-3 py-1 rounded-full">{autoridades.filter(a => a.presente).length} VIP Presentes</span>
                    </div>
                    
                    <div className="font-mono text-[11px] md:text-sm leading-relaxed space-y-4 flex-1 overflow-y-auto pr-3 scroll-hide pb-10">
                        {vocativosDinamicos.map((item, index) => (
                            <p key={index} className={item.tipo === "alerta" ? "text-red-400 italic" : item.tipo === "preside" ? "text-ls-gold text-lg md:text-2xl font-black animate-fade-in border-b border-gray-800 pb-4 mb-4" : item.tipo === "lista" ? "text-gray-200 animate-fade-in text-[10px] md:text-xs" : "text-gray-200 animate-fade-in"}>
                                {item.texto.split(/([rs][\.\s]\s[\wáéíóúÁÉÍÓÚñÑ]+|Alcaldesa|[\wáéíóúÁÉÍÓÚñÑ]+\sde\s[\wáéíóúÁÉÍÓÚñÑ]+)/gi).map((part, i) => (
                                    part.match(/^[rs][\.\s]\s[\wáéíóúÁÉÍÓÚñÑ]+/i) || part.match(/Alcaldesa/i) || part.match(/[\wáéíóúÁÉÍÓÚñÑ]+\sde\s[\wáéíóúÁÉÍÓÚñÑ]+/i)
                                    ? <strong key={i} className="text-white font-black">{part}</strong>
                                    : part
                                ))}
                            </p>
                        ))}
                    </div>
                </div>
            );
        }

        // --- VISTA: TÉCNICA (Haz-in Masivo & Manual) ---
        function TecnicaView({ checklist, setChecklist }) {
            const [terminoBusqueda, setTerminoBusqueda] = useState("");
            const [nuevaTarea, setNuevaTarea] = useState("");
            const refScroll = useRef();

            const filtrados = checklist.filter(t => t.tarea.toLowerCase().includes(terminoBusqueda.toLowerCase()));

            const toggleTarea = (id) => {
                setChecklist(checklist.map(tarea => tarea.id === id ? {...tarea, listo: !tarea.listo} : tarea));
            };

            const agregarTarea = (e) => {
                e.preventDefault();
                if (nuevaTarea.trim() === "") return;
                const nueva = { id: Date.now(), tarea: nuevaTarea.trim(), listo: false };
                setChecklist([...checklist, nueva]);
                setNuevaTarea("");
                setTimeout(() => refScroll.current.scrollTo(0, refScroll.current.scrollHeight), 100);
            };

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 h-full">
                    {/* Checklist Masivo */}
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100 flex flex-col h-[70vh]">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg md:text-2xl font-black text-ls-stone flex items-center gap-3"><i data-lucide="ListChecks" className="text-ls-red"></i> Logística de Evento (Haz-in Masivo)</h3>
                            <span className="text-xs font-mono font-bold tracking-tight text-gray-500 bg-gray-50 px-3 py-1 rounded-full shadow-inner border border-gray-100">{checklist.filter(a => a.listo).length} de {checklist.length}</span>
                        </div>
                        <input type="search" placeholder="Buscar tarea..." value={terminoBusqueda} onChange={e => setTerminoBusqueda(e.target.value)} className="w-full pl-4 pr-4 py-4 md:py-4 bg-slate-50 border border-gray-200 rounded-xl outline-none focus:border-ls-red text-sm font-semibold mb-4" />
                        <div ref={refScroll} className="flex-1 overflow-y-auto pr-3 space-y-2 scroll-hide">
                            {filtrados.map(tarea => (
                                <div key={tarea.id} onClick={() => toggleTarea(tarea.id)} className={`cursor-pointer p-4 rounded-xl border flex justify-between items-center transition-all ${tarea.listo ? 'border-green-300 bg-green-50' : 'border-gray-100 hover:border-gray-200'}`}>
                                    <span className={`text-sm md:text-base ${tarea.listo ? 'line-through text-green-700 font-semibold' : 'text-slate-700'}`}>{tarea.tarea}</span>
                                    <div className={`p-1.5 rounded-full border ${tarea.listo ? 'bg-green-100 text-green-600' : 'bg-gray-50 text-gray-200'}`}>
                                        <i data-lucide={tarea.listo ? 'Check' : 'Square'} size="16"></i>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Añadir Manual */}
                    <form onSubmit={agregarTarea} className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100 flex flex-col h-fit sticky top-8">
                        <h3 className="text-lg font-black text-ls-stone flex items-center gap-3 mb-6"><i data-lucide="PlusSquare" className="text-ls-red"></i> Añadir Variable Manual</h3>
                        <textarea value={nuevaTarea} onChange={e => setNuevaTarea(e.target.value)} placeholder="Ej: Confirmar presencia de Bomberos..." className="w-full p-4 h-32 bg-slate-50 border border-gray-200 rounded-xl outline-none focus:border-ls-red text-sm mb-4" required></textarea>
                        <button type="submit" className="w-full bg-ls-red text-white py-4 rounded-xl font-bold flex items-center justify-center gap-3"><i data-lucide="PlusCircle"></i> Añadir a Checklist</button>
                    </form>
                </div>
            )
        }

        // --- NUEVA VISTA: ADMINISTRACIÓN BASE (CRUD Masivo & Fotos) ---
        function AdminBaseView({ autoridades, setAutoridades }) {
            const [terminoBusqueda, setTerminoBusqueda] = useState("");
            const [editandoVip, setEditandoVip] = useState(null); // null, 'nuevo', o el objeto autoridad

            const filtrados = autoridades.filter(a => a.nombre.toLowerCase().includes(terminoBusqueda.toLowerCase()) || a.cargo.toLowerCase().includes(terminoBusqueda.toLowerCase()));

            const guardarVIP = (vipActualizado) => {
                let nuevaLista;
                if (autoridades.some(a => a.id === vipActualizado.id)) {
                    // Edición
                    nuevaLista = autoridades.map(a => a.id === vipActualizado.id ? vipActualizado : a);
                } else {
                    // Nuevo
                    nuevaLista = [...autoridades, vipActualizado];
                }
                const sorted = nuevaLista.sort((a, b) => a.rango - b.rango);
                setAutoridades(sorted);
                // Aquí iría el guardar al archivo JSON (requiere servidor back-end)
                setEditandoVip(null);
            };

            return (
                <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                    {/* Listado Principal */}
                    <div className="xl:col-span-2 space-y-4 bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100 flex flex-col h-[70vh]">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg md:text-2xl font-black text-ls-stone flex items-center gap-3"><i data-lucide="Database" className="text-ls-stone"></i> Administración Base de Autoridades Coquimbo 2026</h3>
                            <button onClick={() => setEditandoVip('nuevo')} className="bg-ls-stone text-ls-gold text-xs font-bold px-4 py-2.5 rounded-xl shadow-lg flex items-center gap-2">
                                <i data-lucide="UserPlus" size="14"></i> Sumar Autoridad
                            </button>
                        </div>
                        <input type="search" placeholder="Buscar por nombre, cargo, rango..." value={terminoBusqueda} onChange={e => setTerminoBusqueda(e.target.value)} className="w-full pl-4 pr-4 py-4 md:py-4 bg-slate-50 border border-gray-200 rounded-xl outline-none focus:border-ls-stone text-sm font-semibold mb-4" />
                        <div className="flex-1 overflow-y-auto pr-3 space-y-2 scroll-hide">
                            {filtrados.map(vip => (
                                <div key={vip.id} className="p-4 rounded-xl border border-gray-100 flex justify-between items-center transition-all bg-gray-50/50">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-12 h-12 rounded-full overflow-hidden border-2 flex items-center justify-center font-bold text-lg bg-gray-100 text-gray-400 border-gray-200`}>
                                            {vip.foto ? <img src={vip.foto} className="w-full h-full object-cover" /> : vip.nombre.charAt(0)}
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-ls-stone text-sm leading-tight flex items-center gap-2">
                                                {vip.nombre}
                                                <span className="text-[9px] font-mono font-normal text-gray-400 bg-gray-100 px-1 rounded">Rango {vip.rango}</span>
                                            </h4>
                                            <p className="text-[10px] font-bold text-ls-red uppercase tracking-wide">{vip.cargo}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setEditandoVip(vip)} className="text-ls-stone/50 hover:text-ls-stone p-2 rounded-full hover:bg-white transition">
                                        <i data-lucide="Edit2" size="16"></i>
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Editor Lateral */}
                    <div className="xl:col-span-1 sticky top-8 h-[70vh] flex flex-col">
                        <VIPEditor vip={editandoVip} autoridades={autoridades} onGuardar={guardarVIP} onCancelar={() => setEditandoVip(null)} />
                    </div>
                </div>
            );
        }

        // COMPONENTE: VIP EDITOR (Añadir/Editar con Fotos)
        function VIPEditor({ vip, autoridades, onGuardar, onCancelar }) {
            const inputFotoRef = useRef();
            const [localFoto, setLocalFoto] = useState("");
            
            // Estado local del formulario
            const [formState, setFormState] = useState({ id: Date.now(), nombre: '', cargo: '', rango: 99, vocativo: 'Sr.', categoria: '', presente: false, foto: "", historia: "" });

            useEffect(() => {
                if (vip === 'nuevo') {
                    setFormState({ id: Date.now(), nombre: '', cargo: '', rango: autoridades.length + 10, vocativo: 'Sr.', categoria: '', presente: false, foto: "", historia: "" });
                    setLocalFoto("");
                } else if (vip) {
                    setFormState(vip);
                    setLocalFoto(vip.foto || "");
                }
            }, [vip]);

            const manejarCargaFoto = (event) => {
                const archivo = event.target.files[0];
                if (archivo) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setLocalFoto(reader.result); // Base64 para visualización
                        setFormState(prev => ({ ...prev, foto: reader.result })); // Guardar como Base64 (simplificación)
                    };
                    reader.readAsDataURL(archivo);
                }
            };

            const onSubmit = (e) => {
                e.preventDefault();
                onGuardar(formState);
            };

            if (!vip) {
                return (
                    <div className="bg-white p-8 rounded-2xl shadow-lg border-2 border-dashed border-gray-100 h-full flex flex-col items-center justify-center text-center text-gray-400 space-y-4">
                        <i data-lucide="UserPlus" size="48"></i>
                        <p className="font-semibold text-sm">Seleccione una autoridad de la lista masiva para editar sus detalles, o haga clic en "Sumar Autoridad" para incorporar una nueva al sistema.</p>
                        <p className="text-xs text-red-500 font-bold">Importante: El guardado es simulado, los cambios no persisten en el archivo JSON real sin back-end.</p>
                    </div>
                );
            }

            return (
                <form onSubmit={onSubmit} className="bg-white p-6 md:p-8 rounded-2xl shadow-lg flex flex-col h-full space-y-4 border border-gray-100">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="text-lg font-black text-ls-stone flex items-center gap-3"><i data-lucide="DatabaseZap" className="text-ls-stone"></i> Editor de Detalles VIP</h3>
                        <button type="button" onClick={onCancelar} className="text-gray-400 hover:text-ls-red"><i data-lucide="X" size="20"></i></button>
                    </div>

                    {/* Foto y Nombre/Cargo */}
                    <div className="flex items-center gap-4 border-b border-gray-100 pb-4">
                        <div className="w-20 h-20 rounded-full border-4 border-slate-100 overflow-hidden bg-gray-50 group relative flex items-center justify-center font-black text-2xl text-gray-300">
                            {localFoto ? <img src={localFoto} className="w-full h-full object-cover" /> : formState.nombre.charAt(0)}
                            <input type="file" ref={inputFotoRef} accept="image/*" onChange={manejarCargaFoto} className="hidden" />
                            <button type="button" onClick={() => inputFotoRef.current.click()} className="absolute inset-0 bg-black/60 text-white opacity-0 group-hover:opacity-100 transition flex items-center justify-center text-[10px] font-bold uppercase p-2 text-center">Subir Foto</button>
                        </div>
                        <div className="flex-1 space-y-2">
                            <input type="text" placeholder="Nombre completo" value={formState.nombre} onChange={e => setFormState({...formState, nombre: e.target.value})} className="w-full p-2.5 border rounded-lg text-sm" required />
                            <input type="text" placeholder="Cargo protocolar oficial" value={formState.cargo} onChange={e => setFormState({...formState, cargo: e.target.value})} className="w-full p-2.5 border rounded-lg text-sm text-ls-red font-semibold" required />
                        </div>
                    </div>

                    {/* Protocolo */}
                    <div className="grid grid-cols-2 gap-3">
                        <div>
                            <label className="text-[10px] font-bold text-gray-500 uppercase">Rango (Orden Protocolar)</label>
                            <input type="number" placeholder="Ej: 31" value={formState.rango} onChange={e => setFormState({...formState, rango: parseInt(e.target.value)})} className="w-full p-2.5 border rounded-lg font-mono" required />
                        </div>
                        <div>
                            <label className="text-[10px] font-bold text-gray-500 uppercase">Vocativo Oficial</label>
                            <input type="text" placeholder="Ej: Honorable Senador" value={formState.vocativo} onChange={e => setFormState({...formState, vocativo: e.target.value})} className="w-full p-2.5 border rounded-lg text-sm" />
                        </div>
                    </div>
                    <div>
                        <label className="text-[10px] font-bold text-gray-500 uppercase">Categoría</label>
                        <input type="text" placeholder="Ej: Municipal Elqui" value={formState.categoria} onChange={e => setFormState({...formState, categoria: e.target.value})} className="w-full p-2.5 border rounded-lg text-sm" />
                    </div>

                    {/* Histórico/Biografía */}
                    <div className="flex-1 flex flex-col">
                        <label className="text-[10px] font-bold text-gray-500 uppercase">Datos Históricos / Notas del Sujeto</label>
                        <textarea value={formState.historia} onChange={e => setFormState({...formState, historia: e.target.value})} placeholder="Ej: Alcaldesa de La Serena (2022-2026). Militante de..." className="w-full flex-1 p-3 bg-slate-50 border border-gray-100 rounded-lg text-xs scroll-hide"></textarea>
                    </div>

                    <div className="flex gap-3 pt-4 border-t border-gray-100">
                        <button type="submit" className="flex-1 bg-ls-stone text-ls-gold py-4 rounded-xl font-bold flex items-center justify-center gap-3"><i data-lucide="Save"></i> Actualizar Base DB</button>
                        <button type="button" onClick={onCancelar} className="px-5 py-4 rounded-xl bg-gray-100 text-gray-500 font-bold hover:bg-gray-200">Cancelar</button>
                    </div>
                </form>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SerenitoApp />);
        
        // Cargar Iconos Lucide
        setTimeout(() => lucide.createIcons(), 200);
        setInterval(() => lucide.createIcons(), 1000);

    </script>
</body>
</html>
