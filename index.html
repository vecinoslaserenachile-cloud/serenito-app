<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.R.E.N.I.T.O. | Mobile</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2210%22 fill=%22%23b91c1c%22 /><text x=%2250%22 y=%2275%22 font-family=%22Arial%22 font-size=%2270%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>S</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'ls-red': '#b91c1c',
              'ls-stone': '#292524',
              'ls-gold': '#d97706',
            }
          }
        }
      }
    </script>
    <style>
        .map-container { height: 250px; width: 100%; border-radius: 0.75rem; z-index: 1; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(0,0,0,0.05); }
        /* Ajuste para móviles: evitar zoom al tocar inputs */
        input, select, textarea { font-size: 16px !important; } 
    </style>
</head>
<body class="bg-slate-100 text-slate-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- DATOS ---
        const DB_AUTORIDADES = [
            { id: 1, nombre: "Daniela Norambuena", cargo: "Alcaldesa", vocativo: "Sra. Alcaldesa", precedencia: "CENTRO", estado: "pendiente" },
            { id: 2, nombre: "Galo Luna", cargo: "Delegado Presidencial", vocativo: "Sr. Delegado", precedencia: "DERECHA 1", estado: "pendiente" },
            { id: 3, nombre: "Cristóbal Juliá", cargo: "Gobernador", vocativo: "Sr. Gobernador", precedencia: "IZQUIERDA 1", estado: "pendiente" },
            { id: 4, nombre: "Ricardo Cifuentes", cargo: "Diputado", vocativo: "H. Diputado", precedencia: "DERECHA 2", estado: "pendiente" },
            { id: 6, nombre: "Concejo Municipal", cargo: "Concejales", vocativo: "Sres. Concejales", precedencia: "PRIMERA FILA", estado: "pendiente" },
        ];

        const UBICACIONES = {
            "El Faro": [-29.9045, -71.2755],
            "Ed. Consistorial": [-29.9027, -71.2520],
            "Coliseo": [-29.9126, -71.2566],
            "Delegación": [-29.9360, -71.2680]
        };

        function SerenitoApp() {
            const [vista, setVista] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false); // Estado para menú móvil
            const [eventos, setEventos] = useState([
                { id: 1, nombre: "Cuenta Pública", fecha: "2026-03-01T11:00", lugar: "Ed. Consistorial", coords: UBICACIONES["Ed. Consistorial"] },
                { id: 2, nombre: "Festival Faro", fecha: "2026-02-28T20:00", lugar: "El Faro", coords: UBICACIONES["El Faro"] }
            ]);
            const [autoridades, setAutoridades] = useState(DB_AUTORIDADES);

            // Función para cerrar menú al elegir opción (UX Móvil)
            const navegar = (v) => {
                setVista(v);
                setMenuOpen(false);
            }

            return (
                <div className="flex h-screen flex-col md:flex-row overflow-hidden">
                    
                    {/* BARRA SUPERIOR MÓVIL (Solo visible en celular) */}
                    <div className="md:hidden bg-ls-stone text-white p-4 flex justify-between items-center shadow-md z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-ls-red rounded flex items-center justify-center font-bold">S</div>
                            <span className="font-bold tracking-tighter">S.E.R.E.N.I.T.O.</span>
                        </div>
                        <button onClick={() => setMenuOpen(!menuOpen)}>
                            <i data-lucide={menuOpen ? "X" : "Menu"} size="28"></i>
                        </button>
                    </div>

                    {/* SIDEBAR / MENÚ LATERAL (Responsivo) */}
                    <aside className={`
                        fixed inset-y-0 left-0 z-40 w-64 bg-ls-stone text-white transform transition-transform duration-300 ease-in-out shadow-2xl
                        ${menuOpen ? 'translate-x-0' : '-translate-x-full'} 
                        md:relative md:translate-x-0 md:flex md:flex-col
                    `}>
                        <div className="p-6 hidden md:flex flex-col items-center border-b border-gray-700">
                            <div className="w-12 h-12 bg-ls-red rounded-xl flex items-center justify-center font-black text-3xl shadow-lg mb-2">S</div>
                            <h1 className="text-xl font-black tracking-tighter">S.E.R.E.N.I.T.O.</h1>
                            <p className="text-[10px] uppercase tracking-widest text-gray-400">v5.0 Mobile</p>
                        </div>
                        
                        <nav className="flex-1 py-6 space-y-1 px-3 mt-14 md:mt-0">
                            <MenuBtn id="dashboard" icon="LayoutGrid" label="Resumen" active={vista==='dashboard'} onClick={()=>navegar('dashboard')} />
                            <MenuBtn id="secretaria" icon="CalendarDays" label="Secretaría" active={vista==='secretaria'} onClick={()=>navegar('secretaria')} />
                            <MenuBtn id="protocolo" icon="Award" label="Protocolo VIP" active={vista==='protocolo'} onClick={()=>navegar('protocolo')} />
                            <MenuBtn id="tecnico" icon="RadioReceiver" label="Técnica Live" active={vista==='tecnico'} onClick={()=>navegar('tecnico')} />
                            <MenuBtn id="prensa" icon="Newspaper" label="Prensa" active={vista==='prensa'} onClick={()=>navegar('prensa')} />
                        </nav>

                        <div className="p-4 bg-gray-900/50 text-xs text-gray-400 text-center md:text-left">
                            Usuario: Rodrigo Godoy
                        </div>
                    </aside>

                    {/* OVERLAY PARA CERRAR MENÚ EN MÓVIL */}
                    {menuOpen && (
                        <div className="fixed inset-0 bg-black/50 z-30 md:hidden" onClick={() => setMenuOpen(false)}></div>
                    )}

                    {/* ÁREA PRINCIPAL */}
                    <main className="flex-1 overflow-y-auto bg-slate-100 p-4 md:p-8 w-full">
                        <header className="flex justify-between items-center mb-6">
                            <h2 className="text-xl md:text-2xl font-black text-ls-stone uppercase tracking-tight flex items-center gap-2">
                                <i data-lucide={obtenerIcono(vista)} className="text-ls-red"></i>
                                {obtenerTitulo(vista)}
                            </h2>
                            <div className="hidden md:block text-right">
                                <p className="text-sm font-bold text-ls-stone">{new Date().toLocaleDateString()}</p>
                            </div>
                        </header>

                        <div className="animate-fade-in pb-20 md:pb-0">
                            {vista === 'dashboard' && <Dashboard eventos={eventos} autoridades={autoridades} />}
                            {vista === 'secretaria' && <Secretaria onGuardar={(e) => setEventos([...eventos, e])} />}
                            {vista === 'protocolo' && <Protocolo lista={autoridades} setLista={setAutoridades} />}
                            {vista === 'tecnico' && <Tecnico eventos={eventos} />}
                            {vista === 'prensa' && <Prensa eventos={eventos} />}
                        </div>
                    </main>
                </div>
            );
        }

        // --- MÓDULOS ---

        function Dashboard({ eventos, autoridades }) {
            useEffect(() => {
                // Mapa simple (evitamos recarga constante en react simple)
                if(document.getElementById('mapa-global') && !document.getElementById('mapa-global')._leaflet_id) {
                    const map = L.map('mapa-global').setView([-29.9045, -71.2550], 13);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                }
            }, []);

            const vipsPresentes = autoridades.filter(a => a.estado === 'presente').length;

            return (
                <div className="space-y-4">
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                        <StatCard label="Eventos" val={eventos.length} icon="Calendar" color="bg-blue-600" />
                        <StatCard label="En Sala" val={`${vipsPresentes}/${autoridades.length}`} icon="Users" color="bg-ls-red" />
                        <StatCard label="Prensa" val="12" icon="Camera" color="bg-ls-stone hidden md:block" />
                    </div>
                    <div className="bg-white p-3 rounded-xl shadow-sm border border-gray-200">
                        <h3 className="font-bold text-gray-600 mb-2 text-sm flex items-center gap-2"><i data-lucide="Map"></i> Territorio</h3>
                        <div id="mapa-global" className="map-container"></div>
                    </div>
                </div>
            );
        }

        function Secretaria({ onGuardar }) {
            const [form, setForm] = useState({ nombre: '', fecha: '', lugar: 'Ed. Consistorial' });
            
            const guardar = (e) => {
                e.preventDefault();
                const coords = UBICACIONES[form.lugar] || [-29.9027, -71.2520];
                onGuardar({ ...form, id: Date.now(), coords });
                alert("Evento Agendado");
                setForm({ nombre: '', fecha: '', lugar: 'Ed. Consistorial' });
            };

            return (
                <div className="bg-white p-6 rounded-xl shadow-md">
                    <form onSubmit={guardar} className="space-y-4">
                        <div>
                            <label className="label">Nombre Evento</label>
                            <input required className="input" placeholder="Ej: Inauguración" value={form.nombre} onChange={e=>setForm({...form, nombre: e.target.value})} />
                        </div>
                        <div>
                            <label className="label">Fecha y Hora</label>
                            <input required type="datetime-local" className="input" value={form.fecha} onChange={e=>setForm({...form, fecha: e.target.value})} />
                        </div>
                        <div>
                            <label className="label">Lugar</label>
                            <select className="input" value={form.lugar} onChange={e=>setForm({...form, lugar: e.target.value})}>
                                {Object.keys(UBICACIONES).map(u => <option key={u} value={u}>{u}</option>)}
                            </select>
                        </div>
                        <button className="btn-primary w-full py-4 text-lg">Guardar Hito</button>
                    </form>
                </div>
            );
        }

        function Protocolo({ lista, setLista }) {
            const checkIn = (id) => {
                setLista(lista.map(a => a.id === id ? { ...a, estado: a.estado === 'pendiente' ? 'presente' : 'pendiente' } : a));
            };

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {lista.map(vip => (
                        <div key={vip.id} onClick={() => checkIn(vip.id)} className={`cursor-pointer p-4 rounded-xl border shadow-sm flex justify-between items-center bg-white active:scale-95 transition-transform ${vip.estado === 'presente' ? 'border-green-500 bg-green-50' : 'border-gray-200'}`}>
                            <div className="flex items-center gap-3">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold ${vip.estado === 'presente' ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-500'}`}>
                                    {vip.nombre.charAt(0)}
                                </div>
                                <div>
                                    <h4 className="font-bold text-gray-800 text-sm leading-tight">{vip.nombre}</h4>
                                    <p className="text-[10px] font-bold text-ls-red uppercase">{vip.cargo}</p>
                                    {vip.estado === 'presente' && <span className="text-[10px] bg-ls-gold text-white px-1 rounded animate-pulse">{vip.precedencia}</span>}
                                </div>
                            </div>
                            <div className={`p-2 rounded-full ${vip.estado === 'presente' ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-400'}`}>
                                <i data-lucide={vip.estado === 'presente' ? 'UserCheck' : 'User'} size="20"></i>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function Tecnico({ eventos }) {
            return (
                <div className="grid grid-cols-1 gap-4">
                    {eventos.map(ev => <CronometroCard key={ev.id} evento={ev} />)}
                    {eventos.length === 0 && <p className="text-center text-gray-400 mt-10">Sin eventos activos.</p>}
                </div>
            );
        }

        const CronometroCard = ({ evento }) => {
            const [timeLeft, setTimeLeft] = useState("");
            const [status, setStatus] = useState("pending");

            useEffect(() => {
                const interval = setInterval(() => {
                    const diff = new Date(evento.fecha) - new Date();
                    if (diff < 0) { setTimeLeft("EN CURSO"); setStatus("running"); } 
                    else {
                        const h = Math.floor((diff % (86400000)) / 3600000);
                        const m = Math.floor((diff % 3600000) / 60000);
                        const s = Math.floor((diff % 60000) / 1000);
                        setTimeLeft(`${h}h ${m}m ${s}s`);
                        setStatus("pending");
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [evento]);

            return (
                <div className="bg-ls-stone text-white rounded-xl p-5 shadow-xl border-t-4 border-ls-red relative">
                    <div className="flex justify-between mb-2">
                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${status === 'running' ? 'bg-ls-red animate-pulse' : 'bg-blue-600'}`}>
                            {status === 'running' ? 'AL AIRE' : 'PRÓXIMO'}
                        </span>
                    </div>
                    <h3 className="text-lg font-bold leading-none mb-1">{evento.nombre}</h3>
                    <p className="text-xs text-gray-400 mb-4">{evento.lugar}</p>
                    <div className="bg-black/40 rounded-lg p-3 text-center">
                        <span className="text-4xl md:text-5xl font-mono font-bold text-ls-gold tracking-tight">{timeLeft}</span>
                    </div>
                </div>
            )
        }

        function Prensa({ eventos }) {
            return (
                <div className="bg-white p-4 rounded-xl shadow-sm text-center border-2 border-dashed border-gray-300">
                    <i data-lucide="UploadCloud" className="mx-auto text-gray-400 mb-2" size="40"></i>
                    <p className="font-bold text-gray-600">Subir Material</p>
                    <p className="text-xs text-gray-400 mb-4">Selecciona un evento para cargar fotos</p>
                    <div className="space-y-2">
                        {eventos.map(ev => (
                            <button key={ev.id} className="w-full bg-gray-100 p-3 rounded text-sm font-bold text-left hover:bg-blue-100">{ev.nombre}</button>
                        ))}
                    </div>
                </div>
            )
        }

        // UTILS
        const MenuBtn = ({ id, icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl mb-1 transition-all ${active ? 'bg-ls-red text-white shadow-lg' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}`}>
                <i data-lucide={icon} size="20"></i>
                <span className="text-sm font-semibold">{label}</span>
            </button>
        );

        const StatCard = ({ label, val, icon, color }) => (
            <div className={`${color} text-white p-4 rounded-xl shadow-md relative overflow-hidden`}>
                <p className="text-[10px] uppercase opacity-80 font-bold">{label}</p>
                <p className="text-2xl font-black mt-1">{val}</p>
                <div className="absolute right-2 bottom-2 opacity-20"><i data-lucide={icon} size="32"></i></div>
            </div>
        );

        const obtenerTitulo = (v) => ({ dashboard: 'Inteligencia', secretaria: 'Gestión Hitos', protocolo: 'Protocolo VIP', tecnico: 'Control Live', prensa: 'Prensa' }[v]);
        const obtenerIcono = (v) => ({ dashboard: 'Map', secretaria: 'FileText', protocolo: 'Award', tecnico: 'Cpu', prensa: 'Share2' }[v]);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SerenitoApp />);
        setInterval(() => lucide.createIcons(), 500);

    </script>
    <style>
        .input { width: 100%; padding: 0.8rem; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 0.5rem; }
        .label { display: block; font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 0.25rem; }
        .btn-primary { background: #1e3a8a; color: white; padding: 0.8rem; border-radius: 0.5rem; font-weight: bold; }
    </style>
</body>
</html>
