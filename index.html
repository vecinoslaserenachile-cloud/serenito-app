<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.R.E.N.I.T.O. | Gestión La Serena 2026</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2210%22 fill=%22%23b91c1c%22 /><text x=%2250%22 y=%2275%22 font-family=%22Arial%22 font-size=%2270%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>S</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'ls-red': '#b91c1c',      // Rojo Granate La Serena
              'ls-red-dark': '#7f1d1d', // Rojo Oscuro para hover
              'ls-yellow': '#facc15',   // Amarillo (No dorado)
              'ls-gray': '#f1f5f9',     // Fondo claro
            }
          }
        }
      }
    </script>
    <style>
        .map-container { height: 100%; min-height: 400px; width: 100%; border-radius: 0.75rem; z-index: 1; }
        .map-mini { height: 250px; width: 100%; border-radius: 0.5rem; z-index: 1; border: 2px solid #e2e8f0; }
        
        /* Iconos Mapa */
        .pulse-icon { background-color: #b91c1c; border-radius: 50%; width: 20px; height: 20px; border: 3px solid white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(185, 28, 28, 0); } 100% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0); } }
        
        .movil-icon { background: white; border-radius: 50%; border: 2px solid #b91c1c; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); width: 30px; height: 30px; color: #b91c1c; }
        
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-ls-gray text-slate-800 overflow-x-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- DATOS INICIALES ---
        const UBICACIONES = { "El Faro": [-29.9045, -71.2755], "Ed. Consistorial": [-29.9027, -71.2520], "Coliseo": [-29.9126, -71.2566] };
        
        const EVENTOS_INICIALES = [
            { id: 1, nombre: "Cuenta Pública 2026", fecha: "2026-04-28T11:00", lugar: "Ed. Consistorial", coords: UBICACIONES["Ed. Consistorial"] },
            { id: 2, nombre: "Festival del Faro", fecha: "2026-02-28T21:00", lugar: "El Faro", coords: UBICACIONES["El Faro"] }
        ];

        const CHECKLIST_INICIAL = [
            { id: 1, tarea: "Audio y Micrófonos Probados", listo: false },
            { id: 2, tarea: "Banderas (Chile, Región, Comuna)", listo: false },
            { id: 3, tarea: "Agua para Autoridades", listo: false },
            { id: 4, tarea: "Podio e Iluminación", listo: false },
            { id: 5, tarea: "Guion Impreso para Locutor", listo: false },
        ];

        function SerenitoApp() {
            // ESTADOS
            const [vista, setVista] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [eventos, setEventos] = useState(EVENTOS_INICIALES);
            const [autoridades, setAutoridades] = useState([]); 
            const [locutorNombre, setLocutorNombre] = useState(""); // Nombre del Locutor
            const [errorCarga, setErrorCarga] = useState(null);

            // CARGA JSON
            useEffect(() => {
                fetch('autoridades_coquimbo_2026.json')
                    .then(res => {
                        if (!res.ok) throw new Error("Error JSON");
                        return res.json();
                    })
                    .then(data => setAutoridades(data.sort((a, b) => a.precedencia - b.precedencia)))
                    .catch(err => setErrorCarga("⚠️ Error cargando 'autoridades_coquimbo_2026.json'"));
            }, []);

            const navegar = (v) => { setVista(v); setMenuOpen(false); }

            return (
                <div className="flex h-screen flex-col md:flex-row overflow-hidden">
                    
                    {/* SIDEBAR ROJO LA SERENA */}
                    <aside className={`
                        fixed inset-y-0 left-0 z-40 w-72 bg-white border-r border-gray-200 transform transition-transform duration-300 ease-in-out flex flex-col shadow-xl
                        ${menuOpen ? 'translate-x-0' : '-translate-x-full'} 
                        md:relative md:translate-x-0
                    `}>
                        <div className="p-6 flex flex-col items-center bg-ls-red text-white">
                            <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center font-black text-4xl text-ls-red shadow-lg mb-3 border-4 border-ls-yellow">S</div>
                            <h1 className="text-xl font-black tracking-tighter">S.E.R.E.N.I.T.O.</h1>
                            <p className="text-[10px] uppercase font-bold text-ls-yellow mt-1">Gestión 2026</p>
                        </div>
                        
                        <nav className="flex-1 py-6 px-3 space-y-1 overflow-y-auto bg-gray-50">
                            <p className="px-4 text-[10px] font-bold text-gray-400 uppercase mb-2">Gestión</p>
                            <MenuBtn icon="Map" label="Mapa Táctico" active={vista==='dashboard'} onClick={()=>navegar('dashboard')} />
                            <MenuBtn icon="CalendarPlus" label="Secretaría & Hitos" active={vista==='secretaria'} onClick={()=>navegar('secretaria')} />
                            
                            <p className="px-4 text-[10px] font-bold text-gray-400 uppercase mb-2 mt-4">Evento en Vivo</p>
                            <MenuBtn icon="Award" label="Protocolo (Puerta)" active={vista==='protocolo'} onClick={()=>navegar('protocolo')} />
                            <MenuBtn icon="Mic2" label="Pantalla Locutor" active={vista==='locutor'} onClick={()=>navegar('locutor')} />
                            <MenuBtn icon="Settings" label="Técnica (Haz-in)" active={vista==='tecnica'} onClick={()=>navegar('tecnica')} />
                        </nav>
                        
                        <div className="p-4 bg-white border-t border-gray-200 flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-ls-red text-white flex items-center justify-center font-bold">RG</div>
                            <div>
                                <p className="font-bold text-sm text-gray-700">Rodrigo Godoy</p>
                                <p className="text-green-600 text-[10px] font-bold">● Conectado</p>
                            </div>
                        </div>
                    </aside>

                    {/* CABECERA MÓVIL */}
                    <div className="md:hidden bg-ls-red text-white p-4 flex justify-between items-center z-50 shadow-md">
                        <span className="font-bold">S.E.R.E.N.I.T.O.</span>
                        <button onClick={() => setMenuOpen(!menuOpen)}><i data-lucide="Menu"></i></button>
                    </div>

                    {/* ÁREA PRINCIPAL */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 w-full relative">
                        {errorCarga && <div className="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm border border-red-200">{errorCarga}</div>}

                        {/* VISTA 1: DASHBOARD (MAPA TÁCTICO) */}
                        {vista === 'dashboard' && <Dashboard eventos={eventos} autoridades={autoridades} />}

                        {/* VISTA 2: SECRETARÍA (MAPA GEOREFERENCIADO) */}
                        {vista === 'secretaria' && <Secretaria onGuardar={(nuevo) => setEventos([...eventos, nuevo])} />}

                        {/* VISTA 3: PROTOCOLO */}
                        {vista === 'protocolo' && <Protocolo autoridades={autoridades} setAutoridades={setAutoridades} />}

                        {/* VISTA 4: LOCUTOR (CON NOMBRE) */}
                        {vista === 'locutor' && <div className="max-w-4xl mx-auto"><VistaLocutor autoridades={autoridades} nombreLocutor={locutorNombre} setNombreLocutor={setLocutorNombre} /></div>}

                        {/* VISTA 5: TÉCNICA (CHECKLIST) */}
                        {vista === 'tecnica' && <Tecnica eventos={eventos} inicialChecklist={CHECKLIST_INICIAL} />}
                    </main>
                </div>
            );
        }

        // --- COMPONENTES ---

        // 1. DASHBOARD MAPA TÁCTICO
        function Dashboard({ eventos, autoridades }) {
            const mapRef = useRef(null);
            
            useEffect(() => {
                if(!mapRef.current && document.getElementById('mapa-tactico')) {
                    const map = L.map('mapa-tactico').setView([-29.9045, -71.2550], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
                    
                    // Renderizado inicial de marcadores
                    eventos.forEach(ev => {
                        const icon = L.divIcon({ className: '', html: `<div class="pulse-icon"></div>` });
                        L.marker(ev.coords, {icon}).addTo(map).bindPopup(`<b>${ev.nombre}</b><br>En Curso`);
                    });

                    // Móviles simulados
                    const moviles = [
                        {lat: -29.9040, lng: -71.2530, tipo: 'Seguridad'},
                        {lat: -29.9080, lng: -71.2600, tipo: 'Producción'},
                        {lat: -29.9020, lng: -71.2500, tipo: 'Alcaldía'}
                    ];
                    
                    moviles.forEach(m => {
                        const icon = L.divIcon({ className: '', html: `<div class="movil-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg></div>` });
                        L.marker([m.lat, m.lng], {icon}).addTo(map).bindPopup(m.tipo);
                    });

                    mapRef.current = map;
                }
            }, [eventos]);

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-black text-ls-red uppercase flex gap-2"><i data-lucide="Map"></i> Mapa Táctico</h2>
                    
                    {/* LEYENDA / SIMBOLOGÍA */}
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-wrap gap-4 items-center text-sm">
                        <span className="font-bold text-gray-500 uppercase text-xs">Simbología:</span>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-ls-red animate-pulse"></div> Evento Activo</div>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full border-2 border-ls-red bg-white"></div> Móvil GPS</div>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-ls-yellow"></div> Punto Crítico</div>
                    </div>

                    <div className="bg-white p-1 rounded-2xl shadow-lg border border-gray-200">
                        <div id="mapa-tactico" className="map-container"></div>
                    </div>
                </div>
            );
        }

        // 2. SECRETARÍA CON GEOREFERENCIA
        function Secretaria({ onGuardar }) {
            const [form, setForm] = useState({ nombre: '', lugar: 'Otro (Usar Mapa)', fecha: '', coords: null });
            const mapRef = useRef(null);

            useEffect(() => {
                if(!mapRef.current && document.getElementById('mapa-geo')) {
                    const map = L.map('mapa-geo').setView([-29.9045, -71.2550], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
                    
                    let marker;
                    // EVENTO DE CLIC EN EL MAPA PARA AGREGAR PUNTO
                    map.on('click', (e) => {
                        const { lat, lng } = e.latlng;
                        if(marker) map.removeLayer(marker);
                        marker = L.marker([lat, lng]).addTo(map);
                        setForm(prev => ({ ...prev, coords: [lat, lng], lugar: 'Coordenada Personalizada' }));
                    });

                    mapRef.current = map;
                }
            }, []);

            const guardar = (e) => {
                e.preventDefault();
                if(!form.coords) return alert("Seleccione un punto en el mapa abajo 👇");
                onGuardar({ ...form, id: Date.now() });
                alert("Evento Georeferenciado Guardado");
                setForm({ nombre: '', lugar: 'Otro (Usar Mapa)', fecha: '', coords: null });
            }

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div className="bg-white p-8 rounded-2xl shadow-lg border-t-4 border-ls-red">
                        <h2 className="text-xl font-bold mb-6 flex gap-2 text-ls-red"><i data-lucide="PenTool"></i> Nuevo Hito</h2>
                        <form onSubmit={guardar} className="space-y-4">
                            <div><label className="text-xs font-bold uppercase text-gray-500">Nombre Evento</label><input required className="w-full p-3 bg-gray-50 border rounded-lg" value={form.nombre} onChange={e=>setForm({...form, nombre:e.target.value})} placeholder="Ej: Inauguración Plaza" /></div>
                            <div><label className="text-xs font-bold uppercase text-gray-500">Fecha</label><input type="datetime-local" required className="w-full p-3 bg-gray-50 border rounded-lg" value={form.fecha} onChange={e=>setForm({...form, fecha:e.target.value})} /></div>
                            <div className="bg-yellow-50 p-3 rounded text-xs text-yellow-800 border border-yellow-200">
                                📍 <b>Instrucción:</b> Haga clic en el mapa de la derecha para georeferenciar el punto exacto.
                            </div>
                            <div className="text-xs text-gray-400 font-mono">{form.coords ? `Lat: ${form.coords[0].toFixed(4)}, Lng: ${form.coords[1].toFixed(4)}` : 'Esperando coordenada...'}</div>
                            <button className="w-full bg-ls-red text-white font-bold py-4 rounded-lg hover:bg-red-800 transition shadow-lg">Guardar Hito</button>
                        </form>
                    </div>
                    
                    <div className="space-y-2">
                        <h3 className="font-bold text-gray-600 text-sm uppercase">Seleccionar Ubicación:</h3>
                        <div id="mapa-geo" className="map-container shadow-inner border border-gray-300"></div>
                    </div>
                </div>
            );
        }

        // 3. PROTOCOLO (AMPLIADO)
        function Protocolo({ autoridades, setAutoridades }) {
            const [busqueda, setBusqueda] = useState("");
            const filtrados = autoridades.filter(a => 
                a.nombre.toLowerCase().includes(busqueda.toLowerCase()) || 
                a.cargo.toLowerCase().includes(busqueda.toLowerCase()) ||
                a.categoria.toLowerCase().includes(busqueda.toLowerCase())
            );
            
            return (
                <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                    <div className="xl:col-span-2 bg-white p-6 rounded-2xl shadow-lg border border-gray-100 flex flex-col h-[700px]">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="font-bold flex gap-2 text-ls-red"><i data-lucide="UserCheck"></i> Acreditación (ProtoGate)</h2>
                            <span className="text-xs bg-gray-100 px-2 py-1 rounded font-bold">Total BD: {autoridades.length}</span>
                        </div>
                        <input type="search" placeholder="Buscar por nombre, cargo o comuna..." className="w-full p-3 border rounded-xl mb-4 bg-gray-50 focus:border-ls-red outline-none" value={busqueda} onChange={e=>setBusqueda(e.target.value)} />
                        
                        <div className="flex-1 overflow-y-auto pr-2 scroll-hide space-y-2">
                            {filtrados.map(vip => (
                                <div key={vip.id} onClick={() => setAutoridades(autoridades.map(a => a.id === vip.id ? { ...a, presente: !a.presente } : a))}
                                    className={`p-3 rounded-lg border cursor-pointer flex justify-between items-center transition ${vip.presente ? 'bg-green-50 border-green-500 ring-1 ring-green-500' : 'hover:bg-gray-50 border-gray-200'}`}>
                                    <div className="flex items-center gap-3">
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs ${vip.presente ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-500'}`}>{vip.nombre.charAt(0)}</div>
                                        <div>
                                            <p className="font-bold text-sm">{vip.nombre}</p>
                                            <p className="text-[10px] uppercase text-ls-red font-bold">{vip.cargo}</p>
                                            <p className="text-[9px] text-gray-400">{vip.categoria}</p>
                                        </div>
                                    </div>
                                    <i data-lucide={vip.presente ? 'Check' : 'Plus'} className={vip.presente ? 'text-green-600' : 'text-gray-300'}></i>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="xl:col-span-1 sticky top-4">
                        <VistaLocutor autoridades={autoridades} nombreLocutor="" soloLectura={true} />
                    </div>
                </div>
            );
        }

        // 4. LOCUTOR (CON NOMBRE)
        function VistaLocutor({ autoridades, nombreLocutor, setNombreLocutor, soloLectura }) {
            const presentes = autoridades.filter(a => a.presente).sort((a, b) => a.precedencia - b.precedencia);
            return (
                <div className="bg-white p-6 rounded-2xl shadow-2xl border-t-8 border-ls-red min-h-[500px] flex flex-col">
                    <div className="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                        <h3 className="text-ls-red font-black text-2xl flex gap-2 uppercase"><i data-lucide="Mic2"></i> Pantalla Live</h3>
                        <span className="bg-ls-yellow text-yellow-900 px-3 py-1 rounded-full text-xs font-bold shadow-sm">{presentes.length} VIP Presentes</span>
                    </div>

                    {!soloLectura && (
                        <div className="mb-6 bg-gray-50 p-3 rounded-lg border border-gray-200">
                            <label className="text-[10px] font-bold text-gray-400 uppercase">Nombre Locutor:</label>
                            <input className="w-full bg-transparent font-bold text-gray-800 outline-none" placeholder="Escriba su nombre aquí..." value={nombreLocutor} onChange={e=>setNombreLocutor(e.target.value)} />
                        </div>
                    )}

                    <div className="flex-1 font-mono space-y-4 bg-gray-50 p-6 rounded-xl border border-gray-200 overflow-y-auto">
                         {nombreLocutor && <p className="text-xs text-gray-400 text-right mb-4">🎤 Al micrófono: {nombreLocutor}</p>}
                        
                        {presentes.length === 0 ? <p className="text-red-400 italic text-center mt-10">Esperando autoridades...</p> : (
                            <>
                                <p className="text-xl font-bold border-b border-gray-300 pb-4 leading-relaxed text-gray-800">
                                    Saludamos a quien preside este solemne acto, <span className="text-ls-red">{presentes[0].vocativo} {presentes[0].cargo}, {presentes[0].nombre}</span>.
                                </p>
                                {presentes.length > 1 && (
                                    <>
                                        <p className="text-xs text-gray-500 mt-6 font-bold uppercase">Autoridades Presentes:</p>
                                        <ul className="space-y-3 mt-2">
                                        {presentes.slice(1).map(p => (
                                            <li key={p.id} className="text-sm pl-4 border-l-2 border-ls-yellow text-gray-700">
                                                <span className="font-bold">{p.vocativo}</span>, {p.cargo}, {p.nombre}.
                                            </li>
                                        ))}
                                        </ul>
                                    </>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        // 5. TÉCNICA (CHECKLIST + RELOJES)
        function Tecnica({ eventos, inicialChecklist }) {
            const [checklist, setChecklist] = useState(inicialChecklist);
            
            const toggleTask = (id) => {
                setChecklist(checklist.map(t => t.id === id ? { ...t, listo: !t.listo } : t));
            }

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    {/* Relojes de Hitos */}
                    <div className="space-y-4">
                        <h2 className="font-bold text-xl text-ls-red flex gap-2"><i data-lucide="Clock"></i> Cronómetro de Hitos</h2>
                        {eventos.map(ev => (
                            <div key={ev.id} className="bg-white text-gray-800 p-6 rounded-xl flex justify-between items-center shadow-md border-l-4 border-ls-red">
                                <div><h3 className="font-bold text-lg">{ev.nombre}</h3><p className="text-sm text-gray-500">{new Date(ev.fecha).toLocaleString()}</p></div>
                                <div className="text-2xl font-mono font-bold text-ls-red bg-gray-100 px-3 py-1 rounded">PENDIENTE</div>
                            </div>
                        ))}
                    </div>

                    {/* Checklist "Haz-in" */}
                    <div className="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-ls-yellow">
                         <h2 className="font-bold text-xl text-yellow-600 flex gap-2 mb-4"><i data-lucide="ClipboardList"></i> Checklist Técnica (Haz-in)</h2>
                         <div className="space-y-2">
                            {checklist.map(task => (
                                <div key={task.id} onClick={() => toggleTask(task.id)} className={`p-4 rounded-lg border cursor-pointer flex items-center justify-between transition ${task.listo ? 'bg-green-50 border-green-500 text-green-700' : 'bg-white border-gray-200 hover:bg-gray-50'}`}>
                                    <span className={`font-bold ${task.listo ? 'line-through opacity-70' : ''}`}>{task.tarea}</span>
                                    {task.listo ? <i data-lucide="CheckCircle2"></i> : <div className="w-5 h-5 rounded-full border-2 border-gray-300"></div>}
                                </div>
                            ))}
                         </div>
                         <div className="mt-4 text-center">
                            <div className="w-full bg-gray-200 rounded-full h-2.5">
                                <div className="bg-green-600 h-2.5 rounded-full transition-all duration-500" style={{width: `${(checklist.filter(t=>t.listo).length / checklist.length) * 100}%`}}></div>
                            </div>
                            <p className="text-xs text-gray-500 mt-1">{checklist.filter(t=>t.listo).length} de {checklist.length} completado</p>
                         </div>
                    </div>
                </div>
            )
        }

        const MenuBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl mb-1 transition-all ${active ? 'bg-ls-red text-white shadow-lg' : 'text-gray-500 hover:bg-ls-red/10 hover:text-ls-red'}`}>
                <i data-lucide={icon} size="18"></i><span className="text-sm font-bold">{label}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SerenitoApp />);
        setTimeout(() => lucide.createIcons(), 500);
        setInterval(() => lucide.createIcons(), 2000);
    </script>
</body>
</html>
