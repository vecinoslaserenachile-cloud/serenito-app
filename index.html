<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVENTOS Y RR.PP. IMLS | Sistema Integrado</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2210%22 fill=%22%23b91c1c%22 /><text x=%2250%22 y=%2275%22 font-family=%22Arial%22 font-size=%2270%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>LS</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'ls-red': '#b91c1c', 'ls-red-dark': '#7f1d1d', 'ls-yellow': '#facc15', 'ls-gray': '#f8fafc',
            },
            animation: { 'marquee': 'marquee 45s linear infinite' },
            keyframes: { marquee: { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(-100%)' } } }
          }
        }
      }
    </script>
    <style>
        .map-full { width: 100%; height: 100%; min-height: 600px; z-index: 1; border-radius: 1rem; }
        .map-mini { height: 100%; min-height: 300px; width: 100%; border-radius: 0.5rem; z-index: 1; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); border: 1px solid rgba(0,0,0,0.1); }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .pulse-icon { background-color: #b91c1c; border-radius: 50%; width: 24px; height: 24px; border: 3px solid white; animation: pulse 1.5s infinite; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(185, 28, 28, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(185, 28, 28, 0); } }
        .progress-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-ls-gray text-slate-800 overflow-x-hidden font-sans h-screen flex flex-col">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // DATOS INICIALES MULTI-EVENTO (4 Fichas)
        const EVENTOS_INICIALES = [
            { 
                id: 1, nombre: "Inauguración Plaza de Armas", fecha: "2026-04-28T11:00", lugar: "Plaza de Armas", 
                direccion: "Gregorio Cordovez #400", coords: [-29.9027, -71.2520], estado: "En Desarrollo", responsable: "Arq. María González", 
                checklist: [
                    { id: 1, tarea: "Instalación de Carpa 10x20", listo: true },
                    { id: 2, tarea: "Tarima y Podio Institucional", listo: true },
                    { id: 3, tarea: "Prueba de Micrófono Alcaldesa", listo: false },
                    { id: 4, tarea: "Sillas VIP (Primera Fila con Nombre)", listo: false },
                    { id: 5, tarea: "Cinta Tricolor y Tijeras Doradas", listo: false },
                    { id: 6, tarea: "Banderas (Chile, Región, Comuna)", listo: true },
                    { id: 7, tarea: "Sistema de Amplificación Line Array", listo: false },
                    { id: 8, tarea: "Generador Eléctrico de Respaldo", listo: false },
                    { id: 9, tarea: "Agua Mineral para Autoridades", listo: false },
                    { id: 10, tarea: "Atril para Locutor", listo: true }
                ]
            },
            { 
                id: 2, nombre: "Cuenta Pública 2026", fecha: "2026-04-30T19:00", lugar: "Teatro Municipal", 
                direccion: "Benavente #580", coords: [-29.9030, -71.2490], estado: "Pendiente", responsable: "Jefa de Gabinete", 
                checklist: [
                    { id: 1, tarea: "Pantalla LED Gigante (Fondo)", listo: false },
                    { id: 2, tarea: "Iluminación Escénica", listo: false },
                    { id: 3, tarea: "Transmisión Streaming Youtube", listo: false },
                    { id: 4, tarea: "Libretos Impresos (3 Copias)", listo: false },
                    { id: 5, tarea: "Video Resumen Gestión", listo: true },
                    { id: 6, tarea: "Cóctel de Cierre", listo: false }
                ]
            },
            { 
                id: 3, nombre: "Desfile Glorias Navales", fecha: "2026-05-21T10:00", lugar: "Av. del Mar", 
                direccion: "Faro Monumental", coords: [-29.9045, -71.2755], estado: "Planificación", responsable: "Depto. Educación", 
                checklist: [
                    { id: 1, tarea: "Cierre de Calles (Carabineros)", listo: false },
                    { id: 2, tarea: "Palco de Autoridades (Techado)", listo: false },
                    { id: 3, tarea: "Vallas Papales", listo: false },
                    { id: 4, tarea: "Banda Instrumental", listo: true },
                    { id: 5, tarea: "Punto de Hidratación Alumnos", listo: false }
                ]
            },
            { 
                id: 4, nombre: "Show Aniversario La Serena", fecha: "2026-08-26T20:00", lugar: "Estadio La Portada", 
                direccion: "Av. Estadio #1400", coords: [-29.912, -71.256], estado: "Planificación", responsable: "Productora", 
                checklist: [
                    { id: 1, tarea: "Escenario Principal 20x15m", listo: false },
                    { id: 2, tarea: "Camerinos Artistas", listo: false },
                    { id: 3, tarea: "Seguridad Privada (50 Guardias)", listo: false },
                    { id: 4, tarea: "Corte de Ticket / Accesos", listo: false }
                ]
            }
        ];

        function SerenitoApp() {
            const [vista, setVista] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [autoridades, setAutoridades] = useState([]);
            const [eventos, setEventos] = useState(EVENTOS_INICIALES);
            const [locutorNombre, setLocutorNombre] = useState("");
            const [errorCarga, setErrorCarga] = useState(null);

            useEffect(() => {
                const stored = localStorage.getItem('serenito_db_v20');
                if(stored) {
                    setAutoridades(JSON.parse(stored));
                } else {
                    // ?v=timestamp evita caché
                    fetch(`autoridades_coquimbo_2026.json?v=${Date.now()}`)
                        .then(res => res.ok ? res.json() : Promise.reject("Error JSON"))
                        .then(data => {
                            const sorted = data.sort((a, b) => a.precedencia - b.precedencia);
                            setAutoridades(sorted);
                            localStorage.setItem('serenito_db_v20', JSON.stringify(sorted));
                        })
                        .catch(err => setErrorCarga("⚠️ Cargando datos de respaldo..."));
                }
            }, []);

            useEffect(() => {
                if(autoridades.length > 0) localStorage.setItem('serenito_db_v20', JSON.stringify(autoridades));
            }, [autoridades]);

            const navegar = (v) => { setVista(v); setMenuOpen(false); }

            return (
                <div className="flex h-screen flex-col md:flex-row overflow-hidden bg-slate-50 font-sans">
                    
                    {/* SIDEBAR */}
                    <aside className={`fixed inset-y-0 left-0 z-40 w-72 bg-white border-r border-gray-200 transform transition-transform duration-300 ease-in-out flex flex-col shadow-2xl ${menuOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0`}>
                        <div className="p-8 flex flex-col items-center bg-ls-red text-white">
                            <div className="w-14 h-14 bg-white rounded-full flex items-center justify-center font-black text-3xl text-ls-red shadow-lg mb-2 border-4 border-ls-yellow">LS</div>
                            <h1 className="text-sm font-black tracking-tight text-center leading-tight">EVENTOS Y RR.PP.<br/><span className="text-lg">IMLS</span></h1>
                            <p className="text-[9px] uppercase font-bold text-ls-yellow mt-1">Gestión 2026</p>
                        </div>
                        <nav className="flex-1 py-4 px-4 space-y-1 overflow-y-auto bg-gray-50">
                            <Label text="Centro de Mando" />
                            <MenuBtn icon="Map" label="Despliegue Territorial" active={vista==='dashboard'} onClick={()=>navegar('dashboard')} />
                            <MenuBtn icon="CalendarPlus" label="Secretaría & Hitos" active={vista==='secretaria'} onClick={()=>navegar('secretaria')} />
                            
                            <Label text="Operación Live" />
                            <MenuBtn icon="Award" label="Protocolo (Puerta)" active={vista==='protocolo'} onClick={()=>navegar('protocolo')} />
                            <MenuBtn icon="Mic2" label="Pantalla Locutor" active={vista==='locutor'} onClick={()=>navegar('locutor')} />
                            <MenuBtn icon="Settings" label="Técnica (Producción)" active={vista==='tecnica'} onClick={()=>navegar('tecnica')} />
                            
                            <Label text="Administración" />
                            <MenuBtn icon="Database" label="Gestión BD + Fotos" active={vista==='admin'} onClick={()=>navegar('admin')} />
                        </nav>
                        <div className="p-4 border-t border-gray-200">
                            <button className="w-full flex items-center justify-center gap-2 p-2 rounded-lg bg-red-50 text-red-600 font-bold hover:bg-red-100 transition text-xs uppercase"><i data-lucide="LogOut" size={14}></i> Salir</button>
                        </div>
                    </aside>

                    {/* BARRA MÓVIL */}
                    <div className="md:hidden bg-ls-red text-white p-4 flex justify-between items-center z-50 shadow-md">
                        <span className="font-bold">EVENTOS IMLS</span>
                        <button onClick={() => setMenuOpen(!menuOpen)}><i data-lucide="Menu"></i></button>
                    </div>

                    {/* MAIN */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-6 w-full relative flex flex-col h-full bg-slate-50">
                        <div className="flex-1 flex flex-col pb-16 h-full">
                            {errorCarga && <div className="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm border border-red-200">{errorCarga}</div>}
                            
                            {vista === 'dashboard' && <Dashboard eventos={eventos} />}
                            {vista === 'secretaria' && <Secretaria onGuardar={(nuevo) => setEventos([...eventos, nuevo])} />}
                            {vista === 'protocolo' && <Protocolo autoridades={autoridades} setAutoridades={setAutoridades} />}
                            {vista === 'locutor' && <div className="h-full flex flex-col"><VistaLocutor autoridades={autoridades} nombreLocutor={locutorNombre} setNombreLocutor={setLocutorNombre} /></div>}
                            {vista === 'tecnica' && <Tecnica eventos={eventos} setEventos={setEventos} />}
                            {vista === 'admin' && <AdminView autoridades={autoridades} setAutoridades={setAutoridades} />}
                        </div>
                        
                        <Wincha autoridades={autoridades} eventos={eventos} />
                    </main>
                </div>
            );
        }

        // --- 1. DASHBOARD ---
        function Dashboard({ eventos }) {
            const mapRef = useRef(null);
            useEffect(() => {
                if(!mapRef.current && document.getElementById('mapa-tactico')) {
                    const map = L.map('mapa-tactico').setView([-29.9045, -71.2550], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
                    eventos.forEach(ev => {
                        const icon = L.divIcon({ className: '', html: `<div class="pulse-icon"></div>` });
                        L.marker(ev.coords, {icon}).addTo(map).bindPopup(`<b>${ev.nombre}</b><br>${ev.direccion}`);
                    });
                    mapRef.current = map;
                }
            }, [eventos]);
            
            return (
                <div className="h-full flex flex-col">
                    <div className="flex justify-between items-end mb-4">
                        <h2 className="text-2xl font-black text-ls-red uppercase flex gap-2 items-center"><i data-lucide="Map"></i> Despliegue Territorial</h2>
                        <span className="text-xs font-bold bg-white border px-3 py-1 rounded-full text-gray-500">Vista Satelital IMLS</span>
                    </div>
                    <div className="flex-1 relative rounded-2xl overflow-hidden shadow-2xl border-4 border-white h-full min-h-[500px]">
                        <div id="mapa-tactico" className="map-full"></div>
                        <div className="absolute top-4 right-4 glass p-4 rounded-xl shadow-xl z-[500] w-64">
                            <h4 className="text-[10px] font-black text-ls-red uppercase mb-3 border-b border-gray-200 pb-2">Resumen Operativo</h4>
                            <div className="space-y-2">
                                <div className="flex justify-between text-xs font-bold text-gray-700"><span>Hitos Activos:</span><span className="text-ls-red">{eventos.length}</span></div>
                                <div className="flex justify-between text-xs font-bold text-gray-700"><span>En Desarrollo:</span><span className="text-green-600">{eventos.filter(e=>e.estado==="En Desarrollo").length}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 2. TÉCNICA (BLINDADA CON SELECCIÓN POR ID) ---
        function Tecnica({ eventos, setEventos }) {
            // USAR ID para selección robusta
            const [selectedId, setSelectedId] = useState(eventos.length > 0 ? eventos[0].id : null);
            
            const sel = eventos.find(e => e.id === selectedId);

            const cambiarEvento = (e, id) => {
                e.preventDefault(); 
                e.stopPropagation();
                setSelectedId(id);
            };

            const toggle = (taskId) => {
                if(!sel) return;
                const nuevoCheck = sel.checklist.map(t => t.id === taskId ? { ...t, listo: !t.listo } : t);
                const actualizado = { ...sel, checklist: nuevoCheck };
                setEventos(eventos.map(ev => ev.id === sel.id ? actualizado : ev));
            }

            const agregarManual = (e) => {
                e.preventDefault();
                if(!sel) return;
                const texto = prompt("Nombre variable:");
                if(texto) {
                    const actualizado = { ...sel, checklist: [...sel.checklist, { id: Date.now(), tarea: texto, listo: false }] };
                    setEventos(eventos.map(ev => ev.id === sel.id ? actualizado : ev));
                }
            }

            if(!sel) return <div className="flex h-full items-center justify-center text-gray-400 font-bold">Sin eventos activos.</div>;

            // Cálculos del Contador
            const total = sel.checklist.length;
            const listos = sel.checklist.filter(t=>t.listo).length;
            const porcentaje = total > 0 ? (listos/total)*100 : 0;
            const terminado = total > 0 && listos === total;

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                    {/* Lista Eventos */}
                    <div className="lg:col-span-1 space-y-3 overflow-y-auto pr-2 border-r border-gray-200">
                        <h2 className="font-black text-lg text-ls-red mb-4 flex items-center gap-2"><i data-lucide="List"></i> Fichas Activas</h2>
                        {eventos.map((ev) => {
                            const t = ev.checklist.length;
                            const l = ev.checklist.filter(x=>x.listo).length;
                            return (
                                <button type="button" key={ev.id} onClick={(e) => cambiarEvento(e, ev.id)} 
                                    className={`w-full text-left p-4 rounded-xl border transition-all ${selectedId === ev.id ? 'bg-ls-red text-white shadow-lg scale-105' : 'bg-white hover:bg-gray-50 border-gray-200 text-gray-600'}`}>
                                    <div className="flex justify-between items-start">
                                        <h3 className="font-bold text-sm mb-1">{ev.nombre}</h3>
                                        {l===t && t>0 && <i data-lucide="CheckCircle" className="text-white fill-green-500" size={16}></i>}
                                    </div>
                                    <div className="flex justify-between items-center text-[10px] opacity-90 mt-1">
                                        <span>{ev.responsable}</span>
                                        <span className={`px-2 py-0.5 rounded font-bold ${selectedId === ev.id ? 'bg-white/20' : 'bg-gray-100'}`}>{l}/{t}</span>
                                    </div>
                                </button>
                            );
                        })}
                    </div>

                    {/* Detalle */}
                    <div className={`lg:col-span-2 bg-white p-6 rounded-2xl shadow-xl border-t-8 flex flex-col h-full overflow-hidden ${terminado ? 'border-green-500' : 'border-ls-yellow'}`}>
                         <div className="flex justify-between items-start mb-4 border-b border-gray-100 pb-4">
                             <div className="flex-1">
                                 <h2 className="font-black text-2xl text-gray-800 flex items-center gap-2">
                                     {sel.nombre}
                                     {terminado && <span className="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full border border-green-200 uppercase font-black">¡LISTO!</span>}
                                 </h2>
                                 <p className="text-sm text-gray-500 flex items-center gap-2 mt-1"><i data-lucide="MapPin" size={14}></i> {sel.direccion}</p>
                             </div>
                             <button type="button" onClick={agregarManual} className="bg-gray-100 p-2 rounded-lg hover:bg-gray-200 text-xs font-bold flex gap-1"><i data-lucide="Plus" size={14}></i> Variable</button>
                         </div>

                         {/* BARRA DE PROGRESO */}
                         <div className="mb-6">
                             <div className="flex justify-between text-xs font-bold text-gray-500 mb-1 uppercase tracking-wide">
                                 <span>Avance Producción</span>
                                 <span className={terminado ? "text-green-600" : "text-ls-red"}>{listos} de {total} OK</span>
                             </div>
                             <div className="w-full bg-gray-100 rounded-full h-4 shadow-inner overflow-hidden">
                                 <div className={`h-4 rounded-full progress-bar shadow-sm ${terminado ? 'bg-green-500' : 'bg-ls-yellow'}`} style={{width: `${porcentaje}%`}}></div>
                             </div>
                         </div>
                         
                         <div className="space-y-2 flex-1 overflow-y-auto pr-2">
                            {sel.checklist.map(t => (
                                <button type="button" key={t.id} onClick={() => toggle(t.id)} 
                                    className={`w-full p-4 rounded-xl border flex justify-between items-center transition-all ${t.listo ? 'bg-green-50 border-green-500 text-green-800 shadow-inner' : 'bg-white border-gray-100 hover:border-gray-300 shadow-sm'}`}>
                                    <span className={`text-sm font-bold ${t.listo ? 'line-through opacity-60' : 'text-gray-700'}`}>{t.tarea}</span>
                                    {t.listo ? <i data-lucide="CheckCircle2" className="text-green-600" size={20}></i> : <div className="w-5 h-5 rounded-full border-2 border-gray-300 bg-gray-50"></div>}
                                </button>
                            ))}
                         </div>
                    </div>
                </div>
            )
        }

        // --- 3. SECRETARÍA ---
        function Secretaria({ onGuardar }) {
            const [form, setForm] = useState({ nombre: '', responsable: '', fecha: '', coords: null, direccion: '' });
            const mapRef = useRef(null);
            
            useEffect(() => {
                if(!mapRef.current && document.getElementById('mapa-geo')) {
                    const map = L.map('mapa-geo').setView([-29.9045, -71.2550], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
                    
                    map.on('click', (e) => {
                        map.eachLayer((layer) => { if (layer instanceof L.Marker) map.removeLayer(layer); });
                        L.marker(e.latlng).addTo(map);
                        const dir = `Calle Simulada #${Math.floor(Math.random()*5000)}`;
                        setForm(prev => ({ ...prev, coords: [e.latlng.lat, e.latlng.lng], direccion: dir }));
                    });
                    mapRef.current = map;
                }
            }, []);
            
            const guardar = (e) => {
                e.preventDefault();
                if(!form.coords) return alert("Seleccione ubicación en mapa");
                onGuardar({ ...form, id: Date.now(), checklist: [{id:1, tarea: "Instalación Básica", listo: false}], estado: "Pendiente", lugar: "Ubicación Mapa" });
                alert("Evento creado");
                setForm({ nombre: '', responsable: '', fecha: '', coords: null, direccion: '' });
            }
            
            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-full">
                    <div className="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-ls-red">
                        <h2 className="text-xl font-black mb-4 text-ls-red flex gap-2"><i data-lucide="PenTool"></i> Nuevo Hito</h2>
                        <form onSubmit={guardar} className="space-y-4">
                            <input required className="w-full p-3 bg-gray-50 border rounded-lg focus:border-ls-red outline-none" value={form.nombre} onChange={e=>setForm({...form, nombre:e.target.value})} placeholder="Nombre del Evento" />
                            <input required className="w-full p-3 bg-gray-50 border rounded-lg focus:border-ls-red outline-none" value={form.responsable} onChange={e=>setForm({...form, responsable:e.target.value})} placeholder="Responsable (Nombre)" />
                            <input type="datetime-local" required className="w-full p-3 bg-gray-50 border rounded-lg focus:border-ls-red outline-none" value={form.fecha} onChange={e=>setForm({...form, fecha:e.target.value})} />
                            
                            <div className="bg-blue-50 p-4 rounded-lg text-sm text-blue-800 border border-blue-100 flex items-center gap-3">
                                <i data-lucide="MapPin" size={18}/> 
                                <span className="font-bold">{form.direccion || "Haga clic en el mapa para definir ubicación"}</span>
                            </div>
                            
                            <button type="submit" className="w-full bg-ls-red text-white font-bold py-4 rounded-xl shadow-lg hover:bg-red-800 transition flex justify-center gap-2">
                                <i data-lucide="Save"></i> Registrar Hito
                            </button>
                        </form>
                    </div>
                    <div className="rounded-2xl overflow-hidden shadow-lg border border-gray-200 relative h-full">
                        <div id="mapa-geo" className="map-mini"></div>
                    </div>
                </div>
            );
        }

        // ... Protocolo, Locutor, Admin (Sin cambios, ya son estables) ...
        function Protocolo({ autoridades, setAutoridades }) {
            const [filtro, setFiltro] = useState("");
            const filtrados = autoridades.filter(a => a.nombre.toLowerCase().includes(filtro.toLowerCase()) || a.cargo.toLowerCase().includes(filtro.toLowerCase()));
            return (
                <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 h-full">
                    <div className="xl:col-span-2 bg-white p-6 rounded-2xl shadow-lg border border-gray-100 flex flex-col">
                        <h2 className="font-black text-xl text-ls-red flex gap-2 mb-4"><i data-lucide="UserCheck"></i> Acreditación <span className="bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded ml-auto">BD: {autoridades.length}</span></h2>
                        <input className="w-full p-3 border rounded-xl mb-4 bg-gray-50" placeholder="Buscar..." value={filtro} onChange={e=>setFiltro(e.target.value)} />
                        <div className="flex-1 overflow-y-auto pr-2 space-y-2 scroll-hide">
                            {filtrados.map(vip => (
                                <div key={vip.id} onClick={() => setAutoridades(autoridades.map(a => a.id === vip.id ? { ...a, presente: !a.presente } : a))} className={`p-3 rounded-lg border cursor-pointer flex justify-between items-center transition ${vip.presente ? 'bg-red-50 border-ls-red ring-1 ring-ls-red' : 'hover:bg-gray-50'}`}>
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-gray-200 overflow-hidden border">{vip.foto ? <img src={vip.foto} className="avatar-img"/> : <span className="w-full h-full flex items-center justify-center font-bold text-gray-500">{vip.nombre.charAt(0)}</span>}</div>
                                        <div><p className="font-bold text-sm">{vip.nombre}</p><p className="text-[10px] uppercase text-ls-red font-bold">{vip.cargo}</p></div>
                                    </div>
                                    <i data-lucide={vip.presente ? 'Check' : 'Plus'} className={vip.presente ? 'text-ls-red' : 'text-gray-300'}></i>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="xl:col-span-1 h-full"><VistaLocutor autoridades={autoridades} nombreLocutor="" soloLectura={true} /></div>
                </div>
            );
        }

        function VistaLocutor({ autoridades, nombreLocutor, setNombreLocutor, soloLectura }) {
            const presentes = autoridades.filter(a => a.presente).sort((a, b) => a.precedencia - b.precedencia);
            return (
                <div className="bg-white p-6 rounded-2xl shadow-2xl border-t-8 border-ls-red h-full flex flex-col">
                    <div className="flex justify-between items-center mb-4 border-b pb-4">
                        <h3 className="text-ls-red font-black text-xl uppercase flex gap-2"><i data-lucide="Mic2"></i> Pantalla Live</h3>
                        <span className="bg-ls-yellow text-yellow-900 px-2 py-1 rounded text-xs font-bold animate-pulse">EN VIVO</span>
                    </div>
                    {!soloLectura && <input className="w-full bg-gray-50 p-2 rounded border mb-4 font-bold text-center" placeholder="NOMBRE DEL LOCUTOR..." value={nombreLocutor} onChange={e=>setNombreLocutor(e.target.value)} />}
                    <div className="flex-1 bg-gray-50 p-4 rounded-xl border overflow-y-auto">
                        {nombreLocutor && <p className="text-xs text-right mb-2 font-bold text-gray-400">🎙️ {nombreLocutor}</p>}
                        {presentes.length === 0 ? <p className="text-center text-gray-400 mt-10 italic">Esperando autoridades...</p> : (
                            <>
                                <div className="p-4 bg-white rounded-lg border-l-4 border-ls-red shadow-sm mb-4">
                                    <p className="text-xs text-gray-400 uppercase font-bold mb-1">Preside el Acto:</p>
                                    <p className="text-lg font-black leading-tight">Saludamos a <span className="text-ls-red">{presentes[0].vocativo} {presentes[0].nombre}</span>, {presentes[0].cargo}.</p>
                                </div>
                                {presentes.length > 1 && <ul className="space-y-3 pl-2">{presentes.slice(1).map(p => <li key={p.id} className="text-sm font-bold text-gray-700 flex gap-2"><span className="text-ls-red">•</span> {p.vocativo} {p.nombre}, {p.cargo}.</li>)}</ul>}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        function AdminView({ autoridades, setAutoridades }) {
            const [modo, setModo] = useState('lista'); 
            const [form, setForm] = useState({});
            const [filtro, setFiltro] = useState("");

            const guardar = (e) => {
                e.preventDefault();
                let nuevo;
                if(autoridades.find(a => a.id === form.id)) {
                    nuevo = autoridades.map(a => a.id === form.id ? form : a);
                } else {
                    nuevo = [...autoridades, form];
                }
                setAutoridades(nuevo.sort((a,b)=>a.precedencia-b.precedencia));
                setModo('lista');
            }

            const leerFoto = (e) => {
                const file = e.target.files[0];
                if(file){
                    const reader = new FileReader();
                    reader.onloadend = () => setForm({...form, foto: reader.result});
                    reader.readAsDataURL(file);
                }
            }

            if(modo === 'editar') {
                return (
                    <div className="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
                        <h2 className="font-black text-xl mb-4">Editar / Crear Autoridad</h2>
                        <form onSubmit={guardar} className="space-y-3">
                            <div className="flex gap-4 items-center">
                                <div className="w-16 h-16 bg-gray-100 rounded-full overflow-hidden border relative group">
                                    {form.foto ? <img src={form.foto} className="avatar-img" /> : <div className="w-full h-full flex items-center justify-center text-gray-400"><i data-lucide="Camera"></i></div>}
                                    <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" onChange={leerFoto} accept="image/*" />
                                </div>
                                <div className="flex-1"><input required className="w-full p-2 border rounded" value={form.nombre} onChange={e=>setForm({...form, nombre:e.target.value})} placeholder="Nombre" /></div>
                            </div>
                            <input className="w-full p-2 border rounded" value={form.cargo} onChange={e=>setForm({...form, cargo:e.target.value})} placeholder="Cargo" />
                            <div className="grid grid-cols-2 gap-3">
                                <input type="number" className="p-2 border rounded" value={form.precedencia} onChange={e=>setForm({...form, precedencia:Number(e.target.value)})} placeholder="Rango" />
                                <input className="p-2 border rounded" value={form.vocativo} onChange={e=>setForm({...form, vocativo:e.target.value})} placeholder="Vocativo" />
                            </div>
                            <div className="flex gap-2 pt-4">
                                <button className="flex-1 bg-ls-red text-white py-2 rounded-lg font-bold">Guardar</button>
                                <button type="button" onClick={()=>setModo('lista')} className="px-4 py-2 bg-gray-100 rounded-lg">Cancelar</button>
                            </div>
                        </form>
                    </div>
                )
            }

            return (
                <div className="bg-white p-6 rounded-2xl shadow-lg h-full flex flex-col">
                    <div className="flex justify-between mb-4">
                        <h2 className="font-black text-xl">Base de Datos</h2>
                        <button onClick={()=>{setForm({id:Date.now(), nombre:'', cargo:'', precedencia:99, presente:false, foto:''}); setModo('editar')}} className="bg-ls-red text-white px-3 py-1 rounded-lg text-sm font-bold flex gap-2 items-center"><i data-lucide="Plus"></i> Nueva</button>
                    </div>
                    <input className="w-full p-2 border rounded mb-4" placeholder="Buscar..." value={filtro} onChange={e=>setFiltro(e.target.value)} />
                    <div className="flex-1 overflow-y-auto space-y-2">
                        {autoridades.filter(a=>a.nombre.toLowerCase().includes(filtro.toLowerCase())).map(vip => (
                            <div key={vip.id} className="p-3 border rounded-lg flex justify-between items-center hover:bg-gray-50">
                                <div className="flex gap-3 items-center">
                                    <div className="w-8 h-8 rounded-full bg-gray-100 overflow-hidden">{vip.foto && <img src={vip.foto} className="avatar-img" />}</div>
                                    <div><p className="font-bold text-sm">{vip.nombre}</p><p className="text-xs text-gray-500">{vip.cargo}</p></div>
                                </div>
                                <button onClick={()=>{setForm(vip); setModo('editar')}} className="text-blue-600 p-2"><i data-lucide="Edit2" size={16}></i></button>
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        const Label = ({text}) => <p className="px-3 text-[10px] font-bold text-gray-400 uppercase mb-2 mt-4">{text}</p>;
        const MenuBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg mb-1 transition-all ${active ? 'bg-ls-red text-white shadow-md' : 'text-gray-500 hover:bg-red-50 hover:text-ls-red'}`}><i data-lucide={icon} size={18}></i><span className="text-xs font-bold uppercase">{label}</span></button>
        );
        const Wincha = ({ autoridades, eventos }) => {
            const presentes = autoridades.filter(a => a.presente);
            const activos = eventos.filter(e => e.estado === "En Desarrollo");
            const txt = [
                ...presentes.map(a => `🟢 ${a.cargo} ${a.nombre}`),
                ...activos.map(e => `📢 HITO: ${e.nombre}`),
                "☀️ Temp: 18°C", "🚧 Despliegue Operativo"
            ].join("   |   ");

            return (
                <div className="fixed bottom-0 left-0 md:left-72 right-0 bg-ls-red text-white h-8 flex items-center overflow-hidden z-50 border-t-2 border-ls-yellow">
                    <div className="bg-red-900 px-3 h-full flex items-center text-[10px] font-black uppercase z-10">En Vivo</div>
                    <div className="whitespace-nowrap animate-marquee pl-4 text-xs font-bold">{txt || "Sistema en Espera..."}</div>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SerenitoApp />);
        setTimeout(() => lucide.createIcons(), 500);
        setInterval(() => lucide.createIcons(), 2000);
    </script>
</body>
</html>
