<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.R.E.N.I.T.O. | Intelligence Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'serena-dark': '#0f172a', 
              'serena-blue': '#1e40af',
              'serena-gold': '#fbbf24',
            }
          }
        }
      }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .map-container { height: 300px; width: 100%; border-radius: 1rem; z-index: 1; }
        /* Animación de carga */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #1e40af; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- BASE DE DATOS SIMULADA (La Magia) ---
        const DB_DECRETOS = {
            "450": { titulo: "Autorización Uso Espacio Público - El Faro", fecha: "2026-02-20" },
            "102": { titulo: "Adquisición Insumos Protocolares", fecha: "2026-01-15" },
            "880": { titulo: "Decreto Nombramiento Visita Ilustre", fecha: "2026-02-27" }
        };

        const UBICACIONES = {
            "El Faro": [-29.9045, -71.2755],
            "Plaza de Armas": [-29.9027, -71.2520],
            "Estadio La Portada": [-29.9126, -71.2566],
            "Cuatro Esquinas": [-29.9360, -71.2680]
        };

        const VIPS_DEFAULT = [
            { id: 1, nombre: "Daniela Norambuena", cargo: "Alcaldesa", estado: "pendiente" },
            { id: 2, nombre: "Cristóbal Juliá", cargo: "Gobernador", estado: "pendiente" },
            { id: 3, nombre: "Galo Luna", cargo: "Delegado Pres.", estado: "pendiente" },
        ];

        // --- COMPONENTE PRINCIPAL ---
        function SerenitoApp() {
            const [vista, setVista] = useState('dashboard'); // Vista inicial: RESUMEN
            const [loading, setLoading] = useState(false);
            const [eventos, setEventos] = useState([
                { id: 1, nombre: "Inauguración Luces", lugar: "El Faro", coords: UBICACIONES["El Faro"], estado: "activo" }
            ]);
            const [vips, setVips] = useState(VIPS_DEFAULT);

            // Simulación de "Cargando Módulo"
            const cambiarVista = (nuevaVista) => {
                setLoading(true);
                setTimeout(() => {
                    setVista(nuevaVista);
                    setLoading(false);
                }, 600); // 0.6 segundos de "conexión al servidor"
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    
                    {/* BARRA LATERAL (Sidebar) */}
                    <aside className="w-64 bg-serena-dark text-white flex flex-col shadow-2xl z-50">
                        <div className="p-6 border-b border-gray-700">
                            <h1 className="text-2xl font-black tracking-tighter text-white">S.E.R.E.N.I.T.O.</h1>
                            <p className="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Inteligencia Territorial</p>
                        </div>
                        
                        <nav className="flex-1 p-4 space-y-2">
                            <BotonMenu icono="LayoutDashboard" label="Panel Resumen" activo={vista === 'dashboard'} onClick={() => cambiarVista('dashboard')} />
                            <BotonMenu icono="Calendar" label="Secretaría / Agenda" activo={vista === 'secretaria'} onClick={() => cambiarVista('secretaria')} />
                            <BotonMenu icono="Users" label="Protocolo VIP" activo={vista === 'protocolo'} onClick={() => cambiarVista('protocolo')} />
                            <BotonMenu icono="Mic2" label="Técnica / Stage" activo={vista === 'tecnico'} onClick={() => cambiarVista('tecnico')} />
                            <BotonMenu icono="Camera" label="Prensa Hub" activo={vista === 'prensa'} onClick={() => cambiarVista('prensa')} />
                        </nav>

                        <div className="p-4 bg-gray-800 text-xs text-gray-400">
                            <div className="flex items-center gap-2 mb-2">
                                <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                                Servidor Conectado
                            </div>
                            Usuario: R. Godoy (Admin)
                        </div>
                    </aside>

                    {/* ÁREA PRINCIPAL */}
                    <main className="flex-1 overflow-y-auto relative bg-slate-100">
                        
                        {/* HEADER SUPERIOR */}
                        <header className="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-40">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                {loading ? <div className="loader"></div> : obtenerTitulo(vista)}
                            </h2>
                            <div className="flex items-center gap-4">
                                <span className="text-sm font-bold text-serena-blue">{new Date().toLocaleDateString()}</span>
                                <img src="https://via.placeholder.com/40" className="w-10 h-10 rounded-full border-2 border-serena-gold" alt="Profile"/>
                            </div>
                        </header>

                        {/* CONTENIDO DINÁMICO */}
                        <div className="p-6">
                            {loading ? (
                                <div className="flex flex-col items-center justify-center h-96 text-gray-400">
                                    <div className="loader w-10 h-10 mb-4"></div>
                                    <p>Sincronizando datos territoriales...</p>
                                </div>
                            ) : (
                                <>
                                    {vista === 'dashboard' && <Dashboard eventos={eventos} vips={vips} />}
                                    {vista === 'secretaria' && <ModuloSecretaria onGuardar={(e) => setEventos([e, ...eventos])} />}
                                    {vista === 'protocolo' && <ModuloProtocolo vips={vips} setVips={setVips} />}
                                    {vista === 'tecnico' && <ModuloTecnico eventos={eventos} />}
                                    {vista === 'prensa' && <ModuloPrensa />}
                                </>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        // --- 1. MÓDULO DASHBOARD (RESUMEN CENTRAL + MAPA) ---
        function Dashboard({ eventos, vips }) {
            const mapRef = useRef(null);

            // Efecto para cargar el mapa Leaflet
            useEffect(() => {
                if (!document.getElementById('mapid')) return;
                
                // Si el mapa ya existe, no lo recreamos
                if (mapRef.current) return;

                // Inicializar Mapa centrado en La Serena
                const map = L.map('mapid').setView([-29.9027, -71.2520], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);

                // Agregar marcadores de eventos activos
                eventos.forEach(ev => {
                    if(ev.coords) {
                        L.marker(ev.coords).addTo(map)
                            .bindPopup(`<b>${ev.nombre}</b><br>${ev.lugar}`)
                            .openPopup();
                    }
                });

                mapRef.current = map;
            }, [eventos]);

            const vipsEnSala = vips.filter(v => v.estado === 'presente').length;

            return (
                <div className="space-y-6">
                    {/* TARJETAS DE ESTADÍSTICAS */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <TarjetaStat titulo="Eventos Activos" valor={eventos.length} color="bg-blue-600" icono="Calendar" />
                        <TarjetaStat titulo="Autoridades en Sala" valor={`${vipsEnSala}/${vips.length}`} color="bg-purple-600" icono="Users" />
                        <TarjetaStat titulo="Alertas Territoriales" valor="0" color="bg-green-600" icono="Activity" />
                    </div>

                    {/* SECCIÓN DEL MAPA */}
                    <div className="bg-white p-4 rounded-xl shadow-lg border border-gray-200">
                        <h3 className="font-bold text-gray-700 mb-4 flex items-center gap-2">
                            <i data-lucide="MapPin"></i> Georeferencia en Tiempo Real
                        </h3>
                        <div id="mapid" className="map-container shadow-inner border-2 border-gray-300"></div>
                    </div>
                </div>
            );
        }

        // --- 2. MÓDULO SECRETARÍA (CON "MAGIA" DE BÚSQUEDA) ---
        function ModuloSecretaria({ onGuardar }) {
            const [decreto, setDecreto] = useState("");
            const [buscando, setBuscando] = useState(false);
            const [resultadoDecreto, setResultadoDecreto] = useState(null);
            const [form, setForm] = useState({ nombre: "", lugar: "El Faro" });

            // La Magia: Buscar decreto al escribir
            useEffect(() => {
                if(decreto.length >= 3) {
                    setBuscando(true);
                    setResultadoDecreto(null);
                    // Simular retraso de red
                    setTimeout(() => {
                        const encontrado = DB_DECRETOS[decreto];
                        setResultadoDecreto(encontrado || { error: "No encontrado en base municipal" });
                        setBuscando(false);
                    }, 800);
                }
            }, [decreto]);

            const guardar = (e) => {
                e.preventDefault();
                const coords = UBICACIONES[form.lugar] || [-29.9027, -71.2520]; // Default plaza
                onGuardar({ ...form, decreto, coords, id: Date.now() });
                alert("Evento georeferenciado y guardado exitosamente.");
            };

            return (
                <div className="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
                    <h3 className="text-xl font-bold mb-6 text-serena-blue">Nuevo Hito Municipal</h3>
                    <form onSubmit={guardar} className="space-y-4">
                        
                        {/* Búsqueda de Decreto "Mágica" */}
                        <div className="bg-slate-50 p-4 rounded-xl border border-blue-100">
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">N° Decreto Municipal</label>
                            <div className="flex items-center gap-2">
                                <input 
                                    type="text" 
                                    className="w-24 p-2 border rounded-lg font-mono font-bold text-center"
                                    placeholder="Ej: 450"
                                    value={decreto}
                                    onChange={(e) => setDecreto(e.target.value)}
                                />
                                {buscando && <div className="loader"></div>}
                                {!buscando && resultadoDecreto && !resultadoDecreto.error && (
                                    <span className="text-green-600 text-sm font-bold flex items-center gap-1">
                                        ✓ {resultadoDecreto.titulo} ({resultadoDecreto.fecha})
                                    </span>
                                )}
                                {!buscando && resultadoDecreto && resultadoDecreto.error && (
                                    <span className="text-red-500 text-sm">{resultadoDecreto.error}</span>
                                )}
                            </div>
                        </div>

                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Nombre del Evento</label>
                            <input required className="w-full p-3 border rounded-lg" placeholder="Ej: Aniversario La Serena" 
                                value={form.nombre} onChange={e=>setForm({...form, nombre: e.target.value})} />
                        </div>

                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Lugar (Georeferencia)</label>
                            <select className="w-full p-3 border rounded-lg bg-white" 
                                value={form.lugar} onChange={e=>setForm({...form, lugar: e.target.value})}>
                                {Object.keys(UBICACIONES).map(lugar => <option key={lugar} value={lugar}>{lugar}</option>)}
                            </select>
                        </div>

                        <button className="w-full bg-serena-blue text-white py-4 rounded-xl font-bold hover:bg-blue-800 transition shadow-lg flex justify-center items-center gap-2">
                            <i data-lucide="Save"></i> Guardar y Publicar
                        </button>
                    </form>
                </div>
            );
        }

        // --- 3. MÓDULO PROTOCOLO ---
        function ModuloProtocolo({ vips, setVips }) {
            const toggle = (id) => {
                setVips(vips.map(v => v.id === id ? { ...v, estado: v.estado === 'pendiente' ? 'presente' : 'pendiente' } : v));
            };

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {vips.map(vip => (
                        <div key={vip.id} onClick={() => toggle(vip.id)} 
                             className={`cursor-pointer p-6 rounded-2xl border-2 transition-all shadow-md flex justify-between items-center ${vip.estado === 'presente' ? 'bg-green-50 border-green-500' : 'bg-white border-transparent hover:border-gray-300'}`}>
                            <div>
                                <h4 className="font-bold text-lg text-gray-800">{vip.nombre}</h4>
                                <span className="text-xs uppercase font-bold text-gray-400">{vip.cargo}</span>
                            </div>
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center ${vip.estado === 'presente' ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-400'}`}>
                                <i data-lucide={vip.estado === 'presente' ? 'Check' : 'User'}></i>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // --- 4. MÓDULO TÉCNICO ---
        function ModuloTecnico({ eventos }) {
            const [segundos, setSegundos] = useState(0);
            const [activo, setActivo] = useState(false);
            
            useEffect(() => {
                let int;
                if(activo) int = setInterval(() => setSegundos(s => s + 1), 1000);
                return () => clearInterval(int);
            }, [activo]);

            const eventoActual = eventos[0]; // Tomamos el primero por defecto

            return (
                <div className="bg-black text-white p-8 rounded-3xl shadow-2xl relative overflow-hidden border-b-8 border-red-600">
                    <div className="flex justify-between items-start z-10 relative">
                        <div>
                            <span className="bg-red-600 px-3 py-1 rounded text-xs font-bold uppercase tracking-widest animate-pulse">En Aire</span>
                            <h2 className="text-4xl font-black mt-4">{eventoActual?.nombre || "Sin Evento"}</h2>
                            <p className="text-gray-400 mt-2 flex items-center gap-2"><i data-lucide="MapPin" size="16"></i> {eventoActual?.lugar}</p>
                        </div>
                        <div className="text-right">
                            <div className="text-8xl font-mono font-bold text-serena-gold tracking-tighter">
                                {new Date(segundos * 1000).toISOString().substr(14, 5)}
                            </div>
                            <p className="text-xs uppercase tracking-[0.3em] text-gray-500 mt-2">Tiempo Transcurrido</p>
                        </div>
                    </div>
                    
                    <div className="mt-12 grid grid-cols-2 gap-4 z-10 relative">
                        <button onClick={() => setActivo(!activo)} className={`py-6 rounded-xl font-bold text-xl flex justify-center items-center gap-3 ${activo ? 'bg-yellow-600' : 'bg-green-600'}`}>
                            <i data-lucide={activo ? 'Pause' : 'Play'}></i> {activo ? 'PAUSAR' : 'INICIAR'}
                        </button>
                        <button onClick={() => {setActivo(false); setSegundos(0)}} className="bg-gray-800 py-6 rounded-xl font-bold text-xl text-gray-400">
                            REINICIAR
                        </button>
                    </div>
                </div>
            );
        }

        function ModuloPrensa() {
            return (
                <div className="bg-white p-10 rounded-3xl text-center shadow-lg border-2 border-dashed border-gray-300 hover:border-blue-500 transition-colors cursor-pointer group">
                    <i data-lucide="CloudUpload" size="64" className="mx-auto text-gray-300 group-hover:text-blue-500 transition-colors mb-4"></i>
                    <h3 className="text-2xl font-bold text-gray-700">Subir Material Audiovisual</h3>
                    <p className="text-gray-400 mt-2">Arrastra fotos aquí para distribución inmediata a RRPP</p>
                </div>
            )
        }

        // --- COMPONENTES UI ---
        const BotonMenu = ({ icono, label, activo, onClick }) => {
            // Renderizamos el icono usando data-lucide attribute logic simulada
            // Nota: En React puro usaríamos el componente Lucide, pero aquí usamos CDN
            return (
                <button onClick={onClick} 
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activo ? 'bg-serena-blue text-white shadow-lg' : 'text-gray-400 hover:bg-gray-800 hover:text-white'}`}>
                    <i data-lucide={icono} width="20"></i>
                    <span className="font-semibold text-sm">{label}</span>
                </button>
            )
        }

        const TarjetaStat = ({ titulo, valor, color, icono }) => (
            <div className={`${color} text-white p-6 rounded-2xl shadow-lg relative overflow-hidden`}>
                <div className="relative z-10">
                    <p className="text-xs uppercase opacity-80 font-bold mb-1">{titulo}</p>
                    <p className="text-4xl font-black">{valor}</p>
                </div>
                <div className="absolute right-4 bottom-4 opacity-20 transform scale-150">
                    <i data-lucide={icono} size="48"></i>
                </div>
            </div>
        )

        const obtenerTitulo = (v) => {
            const titulos = { dashboard: 'Panel de Control Unificado', secretaria: 'Gestión Administrativa', protocolo: 'Control de Acceso VIP', tecnico: 'Monitor de Escenario', prensa: 'Distribución de Medios' };
            return titulos[v];
        }

        // RENDERIZADO
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SerenitoApp />);

        // Inicializar iconos después del render
        setTimeout(() => lucide.createIcons(), 100);
        // Reinicializar iconos al cambiar vista (truco para React + Lucide CDN)
        setInterval(() => lucide.createIcons(), 1000);

    </script>
</body>
</html>
