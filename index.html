<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.R.E.N.I.T.O. | Live Ops 2026 - Protocolo Dinámico</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2210%22 fill=%22%23b91c1c%22 /><text x=%2250%22 y=%2275%22 font-family=%22Arial%22 font-size=%2270%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>S</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'ls-red': '#b91c1c',
              'ls-stone': '#292524',
              'ls-gold': '#d97706',
              'ls-gold-light': '#fbbf24', // Amarillo brillante para Dark Mode
            }
          }
        }
      }
    </script>
    <style>
        .scroll-hide::-webkit-scrollbar { display: none; }
        input[type="search"]::-webkit-search-cancel-button { cursor: pointer; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 overflow-x-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        function SerenitoApp() {
            // El estado de autoridades se inicializa vacío
            const [autoridades, setAutoridades] = useState([]);
            const [menuOpen, setMenuOpen] = useState(false);
            const [terminoBusqueda, setTerminoBusqueda] = useState("");

            // --- CARGA DINÁMICA DEL PROTOCOLO (JSON EXTERNO) ---
            useEffect(() => {
                // Hacemos el fetch del archivo JSON creado en el Paso 1
                fetch('autoridades_2026.json')
                    .then(response => {
                        if (!response.ok) { throw new Error("Error cargando base de datos."); }
                        return response.json();
                    })
                    .then(data => {
                        // Seteamos las autoridades cargadas
                        setAutoridades(data);
                        console.log(`ProtoDB: ${data.length} autoridades cargadas dinámicamente.`);
                    })
                    .catch(error => {
                        console.error("Critical: Error cargando el protocolo.", error);
                        // Alerta visual de error para el operador
                    });
            }, []); // Se ejecuta solo una vez al inicio

            // --- LÓGICA DE BÚSQUEDA Y FILTRADO ---
            const autoridadesFiltradas = useMemo(() => {
                if (!terminoBusqueda.trim()) return autoridades;
                return autoridades.filter(a => 
                    a.nombre.toLowerCase().includes(terminoBusqueda.toLowerCase()) ||
                    a.cargo.toLowerCase().includes(terminoBusqueda.toLowerCase())
                );
            }, [autoridades, terminoBusqueda]);

            const navegar = (v) => { /* Lógica de navegación existente */ setMenuOpen(false); }

            return (
                <div className="flex h-screen flex-col md:flex-row overflow-hidden font-sans">
                    
                    {/* BARRA MÓVIL SIMULADA */}
                    <div className="md:hidden bg-ls-stone text-white p-4 flex justify-between items-center shadow-md z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-ls-red rounded flex items-center justify-center font-bold">S</div>
                            <span className="font-bold tracking-tighter">S.E.R.E.N.I.T.O. | Dynamic Proto</span>
                        </div>
                        <button onClick={() => setMenuOpen(!menuOpen)}>
                            <i data-lucide={menuOpen ? "X" : "Menu"} size="28"></i>
                        </button>
                    </div>

                    {/* MAIN (Simulación de la vista Acreditación + Locutor) */}
                    <main className="flex-1 overflow-y-auto bg-slate-50 p-4 md:p-8 w-full pb-20 md:pb-8">
                        
                        {/* HEADER PRINCIPAL */}
                        <header className="flex justify-between items-center mb-6 border-b border-gray-200 pb-4">
                            <h2 className="text-xl md:text-3xl font-black text-ls-stone uppercase tracking-tight flex items-center gap-3">
                                <i data-lucide="award" className="text-ls-red hidden md:block"></i>
                                Control Protocolar Real (Live Ops 2026)
                            </h2>
                            <div className="hidden md:block text-right">
                                <p className="text-sm font-bold text-ls-stone bg-white px-3 py-1 rounded-full shadow-sm border border-gray-200">
                                    Base DB: {autoridades.length > 0 ? `${autoridades.length} Autoridades` : 'Cargando...'}
                                </p>
                            </div>
                        </header>

                        {/* DISEÑO DUAL: Acreditación + Locutor */}
                        <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                            
                            {/* PANEL IZQUIERDO: Acreditación / Check-in */}
                            <div className="xl:col-span-2 space-y-4 bg-white p-6 rounded-2xl shadow-lg border border-gray-200">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2"><i data-lucide="UserCheck" className="text-ls-red"></i>Acreditación Puerta (ProtoGate 2026)</h3>
                                </div>
                                
                                {/* BARRA DE BÚSQUEDA TÁCTICA PARA LISTA LARGA */}
                                <div className="relative mb-6">
                                    <i data-lucide="Search" className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" size="20"></i>
                                    <input 
                                        type="search" 
                                        placeholder="Buscar por nombre o cargo (Ej: Alcaldesa, Krist, Concejal...)" 
                                        value={terminoBusqueda}
                                        onChange={e => setTerminoBusqueda(e.target.value)}
                                        className="w-full pl-12 pr-4 py-4 bg-slate-50 border border-gray-200 rounded-xl outline-none transition focus:border-ls-red focus:ring-2 focus:ring-ls-red/10 text-base"
                                    />
                                </div>

                                {/* LISTA DE ACREDITACIÓN (Reactiva y Filtrada) */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4 h-[600px] overflow-y-auto pr-3 scroll-hide border-t border-gray-100 pt-4">
                                    {autoridadesFiltradas.length > 0 ? autoridadesFiltradas.map(vip => (
                                        <div key={vip.id} onClick={() => {
                                            // Toggle estado presente/pendiente
                                            setAutoridades(autoridades.map(a => a.id === vip.id ? { ...a, presente: !a.presente } : a));
                                            console.log(`ProtoGate: VIP ${vip.nombre} toggle.`);
                                        }} className={`cursor-pointer p-4 rounded-xl border flex justify-between items-center bg-white transition-all active:scale-[0.98] ${vip.presente ? 'border-green-500 bg-green-50 ring-2 ring-green-200' : 'border-gray-200 hover:border-gray-300 hover:shadow'}`}>
                                            <div className="flex items-center gap-3">
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm border-2 ${vip.presente ? 'bg-green-600 text-white border-green-700' : 'bg-gray-100 text-gray-400 border-gray-200'}`}>
                                                    {vip.nombre.charAt(0)}
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-gray-800 text-sm leading-tight flex items-center gap-1">
                                                        {vip.nombre}
                                                        <span className="text-[9px] font-mono font-normal text-gray-400 bg-gray-100 px-1 rounded">Rango {vip.rango}</span>
                                                    </h4>
                                                    <p className="text-[10px] font-bold text-ls-red uppercase tracking-wide">{vip.cargo}</p>
                                                    <p className="text-[9px] text-gray-400 italic">"LIGA: {vip.categoria}"</p>
                                                </div>
                                            </div>
                                            <div className={`p-2 rounded-full border ${vip.presente ? 'bg-green-100 text-green-600 border-green-200' : 'bg-gray-50 text-gray-300 border-gray-100'}`}>
                                                <i data-lucide={vip.presente ? 'Check' : 'Plus'} size="20"></i>
                                            </div>
                                        </div>
                                    )) : (
                                        <div className="md:col-span-2 text-center p-10 border-2 border-dashed border-gray-200 rounded-xl text-gray-400 flex flex-col items-center gap-3">
                                            <i data-lucide="SearchX" size="48"></i>
                                            <p>No se encontraron autoridades con "{terminoBusqueda}".</p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* PANEL DERECHO: Pestaña del Locutor (Mismo estilo Reactivo y Estilizado) */}
                            <div className="xl:col-span-1">
                                <VistaLocutor autoridades={autoridades} />
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // COMPONENTE: VISTA DEL LOCUTOR (Recibe la lista larga dinámica)
        function VistaLocutor({ autoridades }) {
            
            // Lógica Central: Filtrar presentes, Ordenar por Rango Oficial y Generar Texto
            const vocativosDinamicos = useMemo(() => {
                // 1. Filtrar presentes
                const presentes = autoridades.filter(a => a.presente);

                // 2. Ordenar por Rango (Precedencia Oficial) - Número menor primero
                presentes.sort((a, b) => a.rango - b.rango);

                // 3. Generar Texto Dinámico
                if (presentes.length === 0) {
                    return [{ texto: "Esperando acreditación de autoridades...", tipo: "alerta" }];
                }

                // Definimos el vocativo para quien preside
                const textoPreside = `${presentes[0].vocativo}, ${presentes[0].cargo}, ${presentes[0].nombre}.`;

                let parrafos = [];
                parrafos.push({ texto: `Saludamos a quien preside este acto, ` + textoPreside, tipo: "preside" });

                // Si hay más, saludamos al resto
                if (presentes.length > 1) {
                    parrafos.push({ texto: `Saludamos también a las siguientes autoridades presentes, ordenadas por estricto protocolo real:`, tipo: "normal" });
                    
                    // Mostramos el resto
                    const resto = presentes.slice(1);
                    resto.forEach(vip => {
                        parrafos.push({ texto: `● ${vip.vocativo}, ${vip.cargo}, ${vip.nombre}.`, tipo: "lista" });
                    });
                }
                
                return parrafos;

            }, [autoridades]); // Se recalcula cada vez que 'autoridades' cambia

            return (
                <div className="bg-black text-white p-6 rounded-2xl shadow-2xl border-4 border-ls-gold-light min-h-[400px] sticky top-8">
                    <div className="flex justify-between items-center mb-6 border-b border-gray-800 pb-3">
                        <h3 className="text-xl font-black text-ls-gold-light uppercase tracking-tighter flex items-center gap-2">
                            <i data-lucide="Mic" className="text-ls-gold-light"></i>
                            Pestaña Locutor
                        </h3>
                        <span className="text-xs text-ls-gold-light font-bold bg-ls-stone px-3 py-1 rounded-full border border-ls-stone/50">{autoridades.filter(a => a.presente).length} Presentes</span>
                    </div>
                    
                    {/* EL TEXTO QUE LEE EL LOCUTOR -> REACTIVO Y ESTILIZADO */}
                    <div className="font-mono text-base leading-relaxed space-y-4">
                        {vocativosDinamicos.map((item, index) => (
                            <p key={index} className={item.tipo === "alerta" ? "text-red-400 italic animate-fade-in" : item.tipo === "preside" ? "text-white text-lg font-black animate-fade-in border-b border-gray-800 pb-3 mb-3" : "text-white animate-fade-in text-sm"}>
                                {/* Resaltar partes clave del vocativo en amarillo brillante */}
                                {item.texto.split(/([rs][\.\s]\s[\wáéíóúÁÉÍÓÚñÑ]+|Alcaldesa|[\wáéíóúÁÉÍÓÚñÑ]+\sde\s[\wáéíóúÁÉÍÓÚñÑ]+|Daniela Norambuena)/gi).map((part, i) => {
                                    if(part.match(/^[rs][\.\s]\s[\wáéíóúÁÉÍÓÚñÑ]+/i) || part.match(/Alcaldesa/i) || part.match(/Daniela Norambuena/i) || part.match(/[\wáéíóúÁÉÍÓÚñÑ]+\sde\s[\wáéíóúÁÉÍÓÚñÑ]+/i)) {
                                        return <strong key={i} className="text-ls-gold-light font-black">{part}</strong>;
                                    }
                                    return part;
                                })}
                            </p>
                        ))}
                    </div>

                    <div className="absolute bottom-4 right-4 text-[9px] text-gray-600 font-mono">
                        Powered by S.E.R.E.N.I.T.O. Logic v7.0 (Rango Dinámico)
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SerenitoApp />);
        
        // Actualizar Lucide Icons después del renderizado y cada cierto tiempo
        setTimeout(() => lucide.createIcons(), 200);
        setInterval(() => lucide.createIcons(), 1000);

    </script>
</body>
</html>
