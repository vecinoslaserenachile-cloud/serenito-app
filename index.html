<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.R.E.N.I.T.O. | Sistema de Gestión Total 2026</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2210%22 fill=%22%23b91c1c%22 /><text x=%2250%22 y=%2275%22 font-family=%22Arial%22 font-size=%2270%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>S</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              'ls-red': '#b91c1c', 'ls-stone': '#292524', 'ls-gold': '#d97706', 'ls-gold-light': '#fbbf24',
            }
          }
        }
      }
    </script>
    <style>
        .map-container { height: 400px; width: 100%; border-radius: 0.75rem; z-index: 1; }
        .pulse-icon { background-color: #ef4444; border-radius: 50%; width: 20px; height: 20px; border: 3px solid white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .movil-icon { background: white; border-radius: 50%; border: 2px solid #3b82f6; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); width: 30px; height: 30px; }
        .movil-prod { border-color: #eab308; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 overflow-x-hidden font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- DATOS INICIALES DEL MAPA Y SECRETARÍA ---
        const UBICACIONES = {
            "El Faro": [-29.9045, -71.2755], "Ed. Consistorial": [-29.9027, -71.2520],
            "Coliseo": [-29.9126, -71.2566], "Delegación": [-29.9360, -71.2680]
        };
        const EVENTOS_INICIALES = [
            { id: 1, nombre: "Cuenta Pública 2026", fecha: "2026-04-28T11:00", lugar: "Ed. Consistorial", coords: UBICACIONES["Ed. Consistorial"] },
            { id: 2, nombre: "Festival del Faro", fecha: "2026-02-28T21:00", lugar: "El Faro", coords: UBICACIONES["El Faro"] }
        ];
        const MOVILES_INICIALES = [
            { id: 'M1', nombre: 'Seguridad 1460', tipo: 'seguridad', lat: -29.9040, lng: -71.2530 },
            { id: 'M2', nombre: 'Producción Van 1', tipo: 'produccion', lat: -29.9080, lng: -71.2600 },
            { id: 'M3', nombre: 'Alcaldía 1', tipo: 'oficial', lat: -29.9020, lng: -71.2500 },
        ];

        function SerenitoApp() {
            // ESTADOS GLOBALES
            const [vista, setVista] = useState('dashboard'); // Vista por defecto: MAPA
            const [menuOpen, setMenuOpen] = useState(false);
            
            // Estados de Datos
            const [eventos, setEventos] = useState(EVENTOS_INICIALES);
            const [moviles, setMoviles] = useState(MOVILES_INICIALES);
            const [autoridades, setAutoridades] = useState([]); // Se carga del JSON
            const [errorCarga, setErrorCarga] = useState(null);

            // 1. CARGA BASE DE DATOS PROTOCOLO (JSON)
            useEffect(() => {
                fetch('autoridades_coquimbo_2026.json')
                    .then(res => {
                        if (!res.ok) throw new Error("Error leyendo JSON");
                        return res.json();
                    })
                    .then(data => {
                        setAutoridades(data.sort((a, b) => a.precedencia - b.precedencia));
                    })
                    .catch(err => {
                        console.error(err);
                        setErrorCarga("⚠️ Error: No se pudo cargar la lista de autoridades (JSON inválido o no encontrado).");
                    });
            }, []);

            // 2. SIMULACIÓN GPS (Mover autitos)
            useEffect(() => {
                const intervalo = setInterval(() => {
                    setMoviles(prev => prev.map(m => ({
                        ...m,
                        lat: m.lat + (Math.random() - 0.5) * 0.0004,
                        lng: m.lng + (Math.random() - 0.5) * 0.0004
                    })));
                }, 2000);
                return () => clearInterval(intervalo);
            }, []);

            const navegar = (v) => { setVista(v); setMenuOpen(false); }

            return (
                <div className="flex h-screen flex-col md:flex-row overflow-hidden">
                    
                    {/* SIDEBAR / BOTONERA (RECUPERADA) */}
                    <aside className={`
                        fixed inset-y-0 left-0 z-40 w-72 bg-ls-stone text-white transform transition-transform duration-300 ease-in-out shadow-2xl flex flex-col
                        ${menuOpen ? 'translate-x-0' : '-translate-x-full'} 
                        md:relative md:translate-x-0
                    `}>
                        <div className="p-6 flex flex-col items-center border-b border-gray-700 bg-gray-900/20">
                            <div className="w-14 h-14 bg-ls-red rounded-xl flex items-center justify-center font-black text-4xl shadow-lg mb-3 border-2 border-white/10">S</div>
                            <h1 className="text-xl font-black tracking-tighter">S.E.R.E.N.I.T.O.</h1>
                            <p className="text-[10px] uppercase text-ls-gold font-bold">Gestión Total 2026</p>
                        </div>
                        
                        <nav className="flex-1 py-6 px-3 space-y-1 overflow-y-auto">
                            <div className="px-4 text-[10px] font-bold text-gray-500 uppercase mb-2">Centro de Mando</div>
                            <MenuBtn icon="Map" label="Mapa Táctico" active={vista==='dashboard'} onClick={()=>navegar('dashboard')} />
                            <MenuBtn icon="Calendar" label="Secretaría & Hitos" active={vista==='secretaria'} onClick={()=>navegar('secretaria')} />
                            
                            <div className="px-4 text-[10px] font-bold text-gray-500 uppercase mb-2 mt-4">Operaciones Live</div>
                            <MenuBtn icon="Award" label="Protocolo (Check-in)" active={vista==='protocolo'} onClick={()=>navegar('protocolo')} />
                            <MenuBtn icon="Mic" label="Pantalla Locutor" active={vista==='locutor'} onClick={()=>navegar('locutor')} />
                            <MenuBtn icon="Cpu" label="Técnica & Crono" active={vista==='tecnica'} onClick={()=>navegar('tecnica')} />
                        </nav>
                        
                        {/* Usuario Logueado */}
                        <div className="p-4 bg-gray-900/50 text-xs text-gray-400 border-t border-gray-800 flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-ls-gold text-white flex items-center justify-center font-bold">RG</div>
                            <div>
                                <p className="font-bold text-white">Rodrigo Godoy</p>
                                <p className="text-green-400 text-[10px]">● Online</p>
                            </div>
                        </div>
                    </aside>

                    {/* BOTÓN MÓVIL (HAMBURGUESA) */}
                    <div className="md:hidden bg-ls-stone text-white p-4 flex justify-between items-center z-50">
                        <span className="font-bold">S.E.R.E.N.I.T.O.</span>
                        <button onClick={() => setMenuOpen(!menuOpen)}><i data-lucide="Menu"></i></button>
                    </div>

                    {/* ÁREA PRINCIPAL */}
                    <main className="flex-1 overflow-y-auto bg-slate-50 p-4 md:p-8 w-full">
                        {errorCarga && <div className="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm border border-red-200">{errorCarga}</div>}

                        {/* VISTA 1: DASHBOARD (MAPA + MÓVILES) */}
                        {vista === 'dashboard' && <Dashboard eventos={eventos} moviles={moviles} autoridades={autoridades} />}

                        {/* VISTA 2: SECRETARÍA (INGRESAR EVENTOS) */}
                        {vista === 'secretaria' && <Secretaria onGuardar={(nuevo) => setEventos([...eventos, nuevo])} />}

                        {/* VISTA 3: PROTOCOLO (CHECK-IN) */}
                        {vista === 'protocolo' && <Protocolo autoridades={autoridades} setAutoridades={setAutoridades} />}

                        {/* VISTA 4: LOCUTOR */}
                        {vista === 'locutor' && <div className="max-w-4xl mx-auto"><VistaLocutor autoridades={autoridades} /></div>}

                        {/* VISTA 5: TÉCNICA */}
                        {vista === 'tecnica' && <Tecnica eventos={eventos} />}
                    </main>
                </div>
            );
        }

        // --- COMPONENTES DEL SISTEMA ---

        // 1. DASHBOARD (MAPA)
        function Dashboard({ eventos, moviles, autoridades }) {
            const mapRef = useRef(null);
            
            useEffect(() => {
                if(!mapRef.current && document.getElementById('mapa')) {
                    const map = L.map('mapa').setView([-29.9045, -71.2550], 14);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
                    mapRef.current = map;
                }
            }, []);

            useEffect(() => {
                const map = mapRef.current;
                if(!map) return;
                
                // Limpiar marcadores previos
                map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });

                // Dibujar Eventos
                eventos.forEach(ev => {
                    const icon = L.divIcon({ className: '', html: `<div class="pulse-icon"></div>` });
                    L.marker(ev.coords, {icon}).addTo(map).bindPopup(`<b>${ev.nombre}</b><br>En Curso`);
                });

                // Dibujar Móviles
                moviles.forEach(m => {
                    const emoji = m.tipo === 'seguridad' ? '🚓' : (m.tipo === 'produccion' ? '🚚' : '🚙');
                    const icon = L.divIcon({ className: '', html: `<div class="movil-icon ${m.tipo === 'produccion' ? 'movil-prod' : ''}">${emoji}</div>` });
                    L.marker([m.lat, m.lng], {icon}).addTo(map).bindPopup(m.nombre);
                });
            }, [moviles, eventos]);

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-black text-ls-stone uppercase flex gap-2"><i data-lucide="Map"></i> Inteligencia Táctica</h2>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <StatCard label="Eventos Activos" val={eventos.length} color="bg-red-600" icon="Calendar" />
                        <StatCard label="Unidades GPS" val={moviles.length} color="bg-blue-600" icon="Car" />
                        <StatCard label="VIP Presentes" val={autoridades.filter(a=>a.presente).length} color="bg-ls-stone" icon="UserCheck" />
                        <StatCard label="Alertas" val="0" color="bg-green-600" icon="ShieldCheck" />
                    </div>
                    <div className="bg-white p-1 rounded-2xl shadow-lg border border-gray-200">
                        <div id="mapa" className="map-container rounded-xl"></div>
                    </div>
                </div>
            );
        }

        // 2. SECRETARÍA (FORMULARIO)
        function Secretaria({ onGuardar }) {
            const [form, setForm] = useState({ nombre: '', lugar: 'Ed. Consistorial', fecha: '' });
            const guardar = (e) => {
                e.preventDefault();
                onGuardar({ ...form, id: Date.now(), coords: UBICACIONES[form.lugar] || [-29.9027, -71.2520] });
                alert("Evento Agregado al Sistema");
                setForm({ nombre: '', lugar: 'Ed. Consistorial', fecha: '' });
            }
            return (
                <div className="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
                    <h2 className="text-xl font-bold mb-6 flex gap-2"><i data-lucide="PenTool"></i> Ingreso de Hitos</h2>
                    <form onSubmit={guardar} className="space-y-4">
                        <div><label className="block text-xs font-bold uppercase text-gray-500 mb-1">Nombre Evento</label><input required className="w-full p-3 bg-slate-50 border rounded-lg" value={form.nombre} onChange={e=>setForm({...form, nombre:e.target.value})} placeholder="Ej: Inauguración Plaza" /></div>
                        <div><label className="block text-xs font-bold uppercase text-gray-500 mb-1">Lugar</label><select className="w-full p-3 bg-slate-50 border rounded-lg" value={form.lugar} onChange={e=>setForm({...form, lugar:e.target.value})}>{Object.keys(UBICACIONES).map(u=><option key={u} value={u}>{u}</option>)}</select></div>
                        <div><label className="block text-xs font-bold uppercase text-gray-500 mb-1">Fecha</label><input type="datetime-local" required className="w-full p-3 bg-slate-50 border rounded-lg" value={form.fecha} onChange={e=>setForm({...form, fecha:e.target.value})} /></div>
                        <button className="w-full bg-ls-red text-white font-bold py-4 rounded-lg hover:bg-red-800 transition">Guardar en Sistema</button>
                    </form>
                </div>
            );
        }

        // 3. PROTOCOLO (CHECK-IN INTEGRADO)
        function Protocolo({ autoridades, setAutoridades }) {
            const [busqueda, setBusqueda] = useState("");
            const filtrados = autoridades.filter(a => a.nombre.toLowerCase().includes(busqueda.toLowerCase()) || a.cargo.toLowerCase().includes(busqueda.toLowerCase()));
            
            return (
                <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                    <div className="xl:col-span-2 bg-white p-6 rounded-2xl shadow-lg h-[600px] flex flex-col">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="font-bold flex gap-2"><i data-lucide="UserCheck"></i> Acreditación (ProtoGate)</h2>
                            <span className="text-xs bg-gray-100 px-2 py-1 rounded">Total BD: {autoridades.length}</span>
                        </div>
                        <input type="search" placeholder="Buscar autoridad..." className="w-full p-3 border rounded-xl mb-4 bg-slate-50" value={busqueda} onChange={e=>setBusqueda(e.target.value)} />
                        <div className="flex-1 overflow-y-auto pr-2 scroll-hide space-y-2">
                            {filtrados.map(vip => (
                                <div key={vip.id} onClick={() => setAutoridades(autoridades.map(a => a.id === vip.id ? { ...a, presente: !a.presente } : a))}
                                    className={`p-3 rounded-lg border cursor-pointer flex justify-between items-center transition ${vip.presente ? 'bg-green-50 border-green-500 ring-1 ring-green-500' : 'hover:bg-gray-50'}`}>
                                    <div className="flex items-center gap-3">
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs ${vip.presente ? 'bg-green-600 text-white' : 'bg-gray-200 text-gray-500'}`}>{vip.nombre.charAt(0)}</div>
                                        <div><p className="font-bold text-sm">{vip.nombre}</p><p className="text-[10px] uppercase text-ls-red font-bold">{vip.cargo}</p></div>
                                    </div>
                                    <i data-lucide={vip.presente ? 'Check' : 'Plus'} className={vip.presente ? 'text-green-600' : 'text-gray-300'}></i>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="xl:col-span-1 sticky top-4">
                        <VistaLocutor autoridades={autoridades} />
                    </div>
                </div>
            );
        }

        // 4. COMPONENTE LOCUTOR
        function VistaLocutor({ autoridades }) {
            const presentes = autoridades.filter(a => a.presente).sort((a, b) => a.precedencia - b.precedencia);
            return (
                <div className="bg-black text-white p-6 rounded-2xl shadow-2xl border-4 border-ls-gold-light min-h-[400px]">
                    <div className="flex justify-between border-b border-gray-800 pb-4 mb-4">
                        <h3 className="text-ls-gold-light font-black text-xl flex gap-2"><i data-lucide="Mic"></i> LIVE</h3>
                        <span className="bg-gray-800 px-2 py-1 rounded text-xs font-bold">{presentes.length} Presentes</span>
                    </div>
                    <div className="font-mono space-y-4">
                        {presentes.length === 0 ? <p className="text-red-400 italic">Esperando autoridades...</p> : (
                            <>
                                <p className="text-lg font-bold border-b border-gray-800 pb-4">
                                    Saludamos a quien preside, <span className="text-ls-gold-light">{presentes[0].vocativo} {presentes[0].cargo}, {presentes[0].nombre}</span>.
                                </p>
                                {presentes.length > 1 && (
                                    <>
                                        <p className="text-xs text-gray-500 mt-4">AUTORIDADES PRESENTES:</p>
                                        {presentes.slice(1).map(p => (
                                            <p key={p.id} className="text-sm pl-4 text-gray-300">● {p.vocativo}, {p.cargo}, {p.nombre}.</p>
                                        ))}
                                    </>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        // 5. TÉCNICA (CRONÓMETRO)
        function Tecnica({ eventos }) {
            return (
                <div className="grid gap-4">
                    <h2 className="font-bold text-xl">Cronómetro de Hitos</h2>
                    {eventos.map(ev => (
                        <div key={ev.id} className="bg-ls-stone text-white p-6 rounded-xl flex justify-between items-center shadow-lg">
                            <div><h3 className="font-bold text-xl">{ev.nombre}</h3><p className="text-sm opacity-70">{new Date(ev.fecha).toLocaleString()}</p></div>
                            <div className="text-4xl font-mono font-bold text-ls-gold-light">EN ESPERA</div>
                        </div>
                    ))}
                </div>
            )
        }

        // UTILS
        const StatCard = ({ label, val, color, icon }) => (
            <div className={`${color} text-white p-4 rounded-xl shadow relative overflow-hidden`}>
                <p className="text-[10px] uppercase font-bold opacity-80">{label}</p>
                <p className="text-3xl font-black">{val}</p>
                <i data-lucide={icon} className="absolute bottom-2 right-2 opacity-20" size="32"></i>
            </div>
        );
        const MenuBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl mb-1 transition ${active ? 'bg-ls-red text-white shadow-lg' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`}>
                <i data-lucide={icon} size="18"></i><span className="text-sm font-semibold">{label}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SerenitoApp />);
        setTimeout(() => lucide.createIcons(), 500);
        setInterval(() => lucide.createIcons(), 2000);
    </script>
</body>
</html>
